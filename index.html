<script>
(function(){
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const grd = ctx.createLinearGradient(0,0,64,64);
  grd.addColorStop(0,'#7DD3FC'); grd.addColorStop(1,'#0284C7');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(8,8,48,48,12) : ctx.rect(8,8,48,48);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 32px Nunito,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Z', 32, 36);
  document.getElementById('favicon').href = c.toDataURL('image/png');
})();
</script>

<style>
:root {
  --font: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'Nunito', -apple-system, sans-serif;
  --easing: cubic-bezier(.4,0,.2,1);
}

html[data-theme="dark"] {
  --bg: #0A1525;
  --bg2: #0F1C32;
  --s1: #14233F;
  --s2: #1C2E50;
  --border: #2F4575;
  --border2: #4760A0;
  --text: #FFFFFF;
  --text2: #D3DDF5;
  --text3: #93A2C9;
  --accent: #FFFFFF;
  --accent-grad: linear-gradient(135deg, #FFFFFF 0%, #B8D4FF 100%);
  --accent-shadow: rgba(255,255,255,.22);
  --accent-text: #0A1525;
  --red: #F87171;
  --shadow-card: 0 14px 36px rgba(0,0,0,.5);
}
html[data-theme="light"] {
  --bg: #F8FBFF;
  --bg2: #EEF5FF;
  --s1: #FFFFFF;
  --s2: #F0F7FF;
  --border: #D9E5F5;
  --border2: #B4CCE8;
  --text: #0A1525;
  --text2: #4D5D7A;
  --text3: #8896AE;
  --accent: #0EA5E9;
  --accent-grad: linear-gradient(135deg, #38BDF8 0%, #0EA5E9 100%);
  --accent-shadow: rgba(14,165,233,.32);
  --accent-text: #FFFFFF;
  --red: #DC2626;
  --shadow-card: 0 10px 30px rgba(40,80,150,.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: var(--font);
  background:
    radial-gradient(ellipse at 15% 10%, rgba(56,189,248,.10) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 90%, rgba(56,189,248,.10) 0%, transparent 55%),
    linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 80px;
  position: relative;
  -webkit-overflow-scrolling: touch;
}

.theme-btn {
  position: fixed;
  top: 24px; right: 24px;
  z-index: 50;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--s1);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s var(--easing);
}
.theme-btn:hover { background: var(--s2); color: var(--text); border-color: var(--accent); }

.hub {
  width: 100%;
  max-width: 820px;
  text-align: center;
  margin: 0 auto;
}
.hub-logo {
  font-family: var(--font);
  font-size: 88px;
  font-weight: 900;
  letter-spacing: .04em;
  display: inline-flex; align-items: baseline; gap: 4px;
  line-height: 1; margin-bottom: 14px;
  text-transform: uppercase;
}
.logo-text {
  background: var(--accent-grad);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
          color: transparent;
}
.logo-dot { color: var(--accent); }

.hub-tagline {
  font-size: 16px;
  color: var(--text2);
  font-weight: 600;
  margin-bottom: 40px;
  letter-spacing: .02em;
}

.user-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 0 auto 36px;
  padding: 16px 22px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px;
  max-width: 440px;
  box-shadow: var(--shadow-card);
}
.user-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background-size: cover; background-position: center;
  background-color: var(--s2);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 18px; color: var(--text2);
  flex-shrink: 0;
}
.user-info { text-align: left; min-width: 0; flex: 1; }
.user-name { font-size: 16px; font-weight: 800; color: var(--text); }
.user-email {
  font-size: 11px; color: var(--text2); font-family: var(--mono);
  margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.hub-welcome {
  font-size: 16px;
  color: var(--text2);
  max-width: 500px;
  margin: 0 auto 28px;
  line-height: 1.55;
  font-weight: 500;
}
.google-signin {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 14px 28px;
  background: #fff;
  color: #1f1f1f;
  border: 1px solid #dadce0;
  border-radius: 14px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 44px;
  transition: all .18s var(--easing);
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
}
.google-signin:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,.30); }
.google-signin svg { width: 20px; height: 20px; }

.hub-apps {
  display: grid;
  grid-template-columns: repeat(2, 1fr);  /* всегда 2 колонки → 2 сверху 2 снизу */
  gap: 24px;
  margin: 0 auto 30px;
  max-width: 820px;
}
.hub-app {
  position: relative;
  display: block;
  padding: 44px 38px;
  min-height: 240px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 34px;
  text-decoration: none;
  color: var(--text);
  text-align: left;
  transition: transform .28s var(--easing), border-color .28s var(--easing), box-shadow .28s var(--easing);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}
.hub-app::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--app-color, var(--accent-grad));
  opacity: .75;
  transition: opacity .2s var(--easing);
}
.hub-app:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 28px 60px rgba(0,0,0,.55);
}
.hub-app:hover::before { opacity: 1; }
.hub-app.locked {
  opacity: .45;
  cursor: not-allowed;
}
.hub-app.locked:hover { transform: none; border-color: var(--border); box-shadow: var(--shadow-card); }

.app-icon-wrap {
  font-size: 60px;
  margin-bottom: 14px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  height: 64px;
}
.app-icon-img {
  width: 100px;
  height: 100px;
  border-radius: 26px;
  display: block;
  box-shadow: 0 12px 32px rgba(0,0,0,.36);
  margin-bottom: 22px;
  transition: transform .28s var(--easing);
}
.hub-app:hover .app-icon-img { transform: scale(1.06) rotate(-2deg); }
.app-name {
  font-size: 38px;
  font-weight: 900;
  letter-spacing: .03em;
  text-transform: uppercase;
  background: var(--app-color, var(--accent-grad));
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
          color: transparent;
  margin-bottom: 10px;
  line-height: 1;
}
.app-desc {
  font-size: 15px;
  color: var(--text2);
  font-weight: 600;
  line-height: 1.5;
  padding-right: 30px;
}
.app-arrow {
  position: absolute;
  top: 28px; right: 24px;
  font-size: 22px;
  color: var(--text3);
  transition: all .2s var(--easing);
}
.hub-app:hover .app-arrow {
  color: var(--accent);
  transform: translateX(6px);
}
.app-lock {
  position: absolute;
  top: 28px; right: 24px;
  font-size: 18px;
  color: var(--text3);
}

.soon-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  padding: 3px 9px;
  background: rgba(167,139,250,.16);
  color: #C4B5FD;
  border: 1px solid #A78BFA;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
}
html[data-theme="light"] .soon-badge { color: #6D28D9; background: rgba(167,139,250,.12); }

.hub-app.focus { --app-color: linear-gradient(135deg, #93C5FD 0%, #3B82F6 100%); }
.hub-app.wallet { --app-color: linear-gradient(135deg, #7DD3FC 0%, #0284C7 100%); }
.hub-app.password { --app-color: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%); }
.hub-app.orbit { --app-color: linear-gradient(135deg, #FB7185 0%, #DB2777 100%); }

.signout-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 10px 26px;
  border-radius: 99px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s var(--easing);
  margin-top: 18px;
}
.signout-btn:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,.08); }

.footer {
  position: fixed;
  bottom: 14px; left: 0; right: 0;
  text-align: center;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .08em;
  pointer-events: none;
}
.footer .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  margin: 0 6px;
  vertical-align: middle;
}
.footer.online .status-dot { background: #34D399; box-shadow: 0 0 6px #34D399; }
.footer.offline .status-dot { background: var(--red); }

/* ── iPhone 16 / mobile ── */
@media (max-width: 768px) {
  body { padding: 28px 16px 90px; }
  .hub-logo { font-size: 60px; }
  .hub-tagline { font-size: 14px; margin-bottom: 28px; }
  .hub-apps { grid-template-columns: 1fr; gap: 14px; }
  .hub-app { padding: 22px 20px; }
  .app-name { font-size: 22px; }
  .app-icon-wrap { font-size: 32px; }
  .theme-btn { top: 16px; right: 16px; width: 36px; height: 36px; }
  .user-row { padding: 14px 18px; gap: 12px; }
  .user-avatar { width: 42px; height: 42px; }
  .google-signin { padding: 12px 22px; font-size: 14px; margin-bottom: 36px; }
  .hub-welcome { font-size: 14px; margin-bottom: 24px; }
  .footer { font-size: 9px; }
}
@media (max-width: 400px) {
  .hub-logo { font-size: 48px; }
}

/* Unified rounded display font (matches ORBIT) */
.hub-logo, .logo-text, .app-name, .user-name { font-family: 'Comfortaa', 'Nunito', sans-serif; letter-spacing: -.01em; }
</style>
</head>
<body>

<button class="theme-btn" id="theme-btn" title="Сменить тему">☀</button>

<div class="hub">
  <div class="hub-logo">
    <span class="logo-text" id="brand-name">DASHBOARD</span><span class="logo-dot">.</span>
  </div>
  <div class="hub-tagline" id="hub-tagline">Личный дашборд</div>

  <div id="hub-auth"></div>
</div>

<div class="footer" id="footer">
  v1 · Google sync<span class="dot status-dot"></span><span id="status-text">подключение...</span>
</div>

<script>
'use strict';

const THEME_KEY = 'hub_theme';

/* ===== I18N DICTIONARY ===== */
const HUB_DICT = {
  'hub.tagline':        { ru: 'Личный дашборд', en: 'Personal dashboard' },
  'hub.welcome':        { ru: 'Войди через Google — твои задачи, заметки и финансы будут синхронизироваться между всеми устройствами автоматически.', en: 'Sign in with Google — your tasks, notes and finances will sync across all your devices automatically.' },
  'hub.signin':         { ru: 'Войти через Google', en: 'Sign in with Google' },
  'hub.signout':        { ru: '🚪 Выйти', en: '🚪 Sign out' },
  'hub.signout_confirm':{ ru: 'Выйти из аккаунта?', en: 'Sign out from your account?' },
  'hub.hi':             { ru: 'Привет', en: 'Hi' },
  'hub.theme.tip':      { ru: 'Сменить тему', en: 'Toggle theme' },
  'hub.status.connecting':{ ru: 'подключение...', en: 'connecting...' },
  'hub.status.in_as':   { ru: 'вошёл как', en: 'signed in as' },
  'hub.status.not_in':  { ru: 'не вошёл', en: 'not signed in' },
  'hub.fb_fail':        { ru: 'Firebase не загрузился. Проверь интернет и обнови страницу.', en: 'Firebase did not load. Check your connection and refresh.' },
  'hub.signin_fail':    { ru: 'Не удалось войти: ', en: 'Sign-in failed: ' },

  'app.focus.desc':     { ru: 'Задачи · проекты · заметки · отчёты', en: 'Tasks · projects · notes · reports' },
  'app.focus.desc_lock':{ ru: 'Задачи · проекты · заметки',          en: 'Tasks · projects · notes' },
  'app.wallet.desc':    { ru: 'Транзакции · бюджет · валюты',        en: 'Transactions · budget · currencies' },
  'app.wallet.desc_lock':{ ru: 'Транзакции · бюджет',                en: 'Transactions · budget' },
  'app.password.desc':  { ru: 'Менеджер паролей · zero-knowledge',   en: 'Password manager · zero-knowledge' },
  'app.password.desc_lock':{ ru: 'Менеджер паролей',                 en: 'Password manager' },
  'app.orbit.desc':     { ru: 'Близкие люди · дни рождения · ИИ-поздравления', en: 'People · birthdays · AI greetings' },
  'app.orbit.desc_lock':{ ru: 'Близкие люди · напоминания',          en: 'People · reminders' }
};
const T = (k, fb) => (window.I18N ? I18N.t(k, fb) : fb || k);

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY) || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '☀' : '🌙';
}
document.getElementById('theme-btn').addEventListener('click', toggleTheme);
initTheme();

let auth = null, googleProvider = null;
try {
  if (typeof firebase !== 'undefined' && firebase.app) {
    auth = firebase.auth();
    googleProvider = new firebase.auth.GoogleAuthProvider();
  }
} catch(e) { console.error('Firebase init failed', e); }

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function setStatus(text, kind) {
  const footer = document.getElementById('footer');
  const st = document.getElementById('status-text');
  if (st) st.textContent = text;
  footer.classList.remove('online','offline');
  if (kind) footer.classList.add(kind);
}

function appCards(loggedIn) {
  function card(slug, name, descKey, lockDescKey) {
    if (loggedIn) {
      return `<a href="${slug}.html" class="hub-app ${slug}">
         <img class="app-icon-img" src="${slug}-icon.png" alt="">
         <div class="app-name">${name}.</div>
         <div class="app-desc">${esc(T(descKey))}</div>
         <div class="app-arrow">→</div>
       </a>`;
    }
    return `<div class="hub-app ${slug} locked">
         <img class="app-icon-img" src="${slug}-icon.png" alt="">
         <div class="app-name">${name}.</div>
         <div class="app-desc">${esc(T(lockDescKey))}</div>
         <div class="app-lock">🔒</div>
       </div>`;
  }
  return card('focus',    'FOCUS',    'app.focus.desc',    'app.focus.desc_lock')
       + card('wallet',   'WALLET',   'app.wallet.desc',   'app.wallet.desc_lock')
       + card('password', 'PASSWORD', 'app.password.desc', 'app.password.desc_lock')
       + card('orbit',    'ORBIT',    'app.orbit.desc',    'app.orbit.desc_lock');
}

let _currentUser = null;

function render(user) {
  if (user !== undefined) _currentUser = user;
  const u = _currentUser;
  const root = document.getElementById('hub-auth');

  document.getElementById('theme-btn').setAttribute('title', T('hub.theme.tip'));
  document.getElementById('hub-tagline').textContent = T('hub.tagline');

  if (u) {
    setStatus(T('hub.status.in_as') + ' ' + (u.email || '?'), 'online');
    const initials = (u.displayName || u.email || 'U')
      .split(/\s+/).map(s => s[0] || '').join('').slice(0,2).toUpperCase();
    const firstName = (u.displayName || '').split(/\s+/)[0] || (T('hub.hi') === 'Hi' ? 'friend' : 'друг');
    const brandName = (u.displayName ? u.displayName.split(/\s+/)[0] : (u.email || '').split('@')[0]) || 'DASHBOARD';
    document.getElementById('brand-name').textContent = brandName.toUpperCase();
    root.innerHTML = `
      <div class="user-row">
        <div class="user-avatar" ${u.photoURL ? `style="background-image:url('${esc(u.photoURL)}')"` : ''}>
          ${u.photoURL ? '' : esc(initials)}
        </div>
        <div class="user-info">
          <div class="user-name">${esc(T('hub.hi'))}, ${esc(firstName)}!</div>
          <div class="user-email">${esc(u.email || '')}</div>
        </div>
      </div>
      <div class="hub-apps">${appCards(true)}</div>
      <button class="signout-btn" id="signout-btn">${esc(T('hub.signout'))}</button>
    `;
    document.getElementById('signout-btn').addEventListener('click', () => {
      if (confirm(T('hub.signout_confirm'))) auth.signOut();
    });
  } else {
    setStatus(T('hub.status.not_in'), 'offline');
    document.getElementById('brand-name').textContent = 'DASHBOARD';
    root.innerHTML = `
      <div class="hub-welcome">${esc(T('hub.welcome'))}</div>
      <button class="google-signin" id="signin-btn">
        <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        ${esc(T('hub.signin'))}
      </button>
      <div class="hub-apps">${appCards(false)}</div>
    `;
    document.getElementById('signin-btn').addEventListener('click', () => {
      if (!auth) { alert(T('hub.fb_fail')); return; }
      auth.signInWithPopup(googleProvider).catch(err => {
        if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
          alert(T('hub.signin_fail') + (err.message || err.code));
        }
      });
    });
  }
}

// init i18n + initial status BEFORE auth callback fires
if (window.I18N) {
  I18N.init({
    dict: HUB_DICT,
    onChange: () => render()
  });
}
setStatus(T('hub.status.connecting'));

function _hubDb() { try { return firebase.firestore(); } catch(e) { return null; } }

if (auth) {
  auth.onAuthStateChanged(user => {
    render(user);
    if (user && window.I18N) {
      I18N.getDb = _hubDb;
      I18N.getUser = () => user;
      I18N.refresh();
    }
    if (window.AIAgent && AIAgent.cfg) AIAgent.refresh();
  });
} else {
  render(null);
}

/* ============ AI-МЕНЕДЖЕР HUB ============
   Объясняет, что делает каждое из 4 приложений. Общий ключ — settings/{uid}. */
let _hubUser = null;
function initHubAgent() {
  if (!window.AIAgent) return;
  AIAgent.init({
    appKey: 'hub',
    appName: 'DASHBOARD',
    title: 'AI · Менеджер',
    subtitle: 'Расскажет про каждый сервис',
    greeting: () => 'Привет! Я помогу разобраться, что делает каждый сервис у тебя в дашборде. Спроси про любой — расскажу простыми словами, для чего он и как лучше пользоваться. 🚀',
    suggestions: [
      { text: '🎯 Что такое FOCUS?',     send: 'Расскажи простым языком, что такое FOCUS, для чего он и как им пользоваться.' },
      { text: '💰 Что такое WALLET?',    send: 'Расскажи простым языком, что такое WALLET, для чего он и как им пользоваться.' },
      { text: '🔐 Что такое PASSWORD?',  send: 'Расскажи простым языком, что такое PASSWORD, что значит "zero-knowledge" и почему это безопасно.' },
      { text: '🪐 Что такое ORBIT?',     send: 'Расскажи простым языком, что такое ORBIT, для чего он и как им пользоваться.' }
    ],
    systemPrompt: () => `Ты — встроенный AI-менеджер на главной странице личного дашборда. Твоя задача — простыми, понятными словами рассказывать пользователю, что делает каждый из четырёх сервисов и как ими пользоваться. Отвечай по-русски, дружелюбно, кратко (3-6 предложений), с уместными эмодзи. Если спрашивают «что такое X» — описывай функционал X с примерами реального использования.

# ОПИСАНИЕ СЕРВИСОВ

## FOCUS — трекер задач и заметок
- Канбан-доска: колонки «План» / «В работе» / «Готово», задачи перетаскиваются мышкой
- Проекты (можно несколько в одном пространстве: «Работа», «Личное»)
- Многостраничные заметки (идеи, ссылки, мысли)
- Графики продуктивности, недельные и месячные отчёты, streak (серия дней)
- AI-помощник внутри: советует что взять в работу, помогает разложить задачи

## WALLET — личные финансы
- Транзакции: доходы и расходы по категориям (Еда, Транспорт, Жильё и т.д.)
- 3 валюты: BYN / USD / EUR с живыми курсами (тянутся раз в час)
- Конвертер валют
- Месячный визуальный отчёт: куда уходят деньги, графики
- AI-помощник внутри: разбирает расходы, советует где сэкономить

## PASSWORD — менеджер паролей с шифрованием
- Хранит логины, карты, заметки, API-ключи, TOTP-коды для 2FA
- Шифрование zero-knowledge: всё шифруется мастер-паролем на твоём устройстве, в облако уходит только зашифрованный блоб. Никто (включая разработчиков и Google) не может прочитать твои пароли
- Генератор надёжных паролей, импорт CSV из Chrome/Bitwarden/1Password
- Авто-блокировка через 15 минут, очистка буфера обмена через 30 секунд
- AI-помощник внутри: помогает найти запись («где Гугл-аккаунт») — но видит только названия, не сами пароли

## ORBIT — личный CRM для близких людей
- Контакты с фото, кругами близости (семья, близкие, друзья, знакомые)
- Дни рождения с напоминаниями за N дней, конфетти в день ДР
- AI-помощник: задаёт 5 коротких вопросов про человека и пишет персональное поздравление
- Вишлист: добавляешь что хочешь в подарок, делишься ссылкой, друзья бронируют (ты не видишь кто что взял — сюрприз)
- Заметки про каждого человека, его интересы, как познакомились

## Общее
- Один логин Google → всё синхронизируется между устройствами через Firebase
- Один AI-ключ (вводится один раз) работает во всех 4 приложениях
- Темы dark/light, языки RU/EN — настройки тоже синхронизируются`,
    getContext: () => '',
    getDb: _hubDb,
    getUser: () => _hubUser
  });
}

function tryInitHubAgent() {
  if (window.AIAgent) initHubAgent();
  else setTimeout(tryInitHubAgent, 100);
}
tryInitHubAgent();

if (auth) {
  auth.onAuthStateChanged(u => { _hubUser = u; if (window.AIAgent?.cfg) AIAgent.refresh(); });
}
</script>
