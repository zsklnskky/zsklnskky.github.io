<style>
:root {
  --font: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --hand: 'Caveat', cursive;
  --easing: cubic-bezier(.4,0,.2,1);
}

html[data-theme="dark"] {
  --bg: #16091B;
  --bg2: #1F0E26;
  --s1: #2B1632;
  --s2: #391E43;
  --s3: #4A2756;
  --border: #50315C;
  --border2: #6E4279;
  --text: #FFFFFF;
  --text2: #F4D6E3;
  --text3: #BD9CAE;
  --accent: #F472B6;
  --accent2: #FB7185;
  --accent-grad: linear-gradient(135deg, #FB7185 0%, #DB2777 100%);
  --accent-grad-soft: linear-gradient(135deg, #FDA4AF 0%, #F472B6 100%);
  --accent-shadow: rgba(244,114,182,.32);
  --accent-bg: rgba(244,114,182,.14);
  --accent-text: #1A0A14;
  --red: #EF4444;
  --red-bg: rgba(239,68,68,.14);
  --amber: #FBBF24;
  --amber-bg: rgba(251,191,36,.14);
  --green: #34D399;
  --green-bg: rgba(52,211,153,.14);
  --blue: #60A5FA;
  --shadow: 0 10px 30px rgba(0,0,0,.45);
  --shadow-lg: 0 22px 56px rgba(0,0,0,.55);
}
html[data-theme="light"] {
  --bg: #FFF1F5;
  --bg2: #FCE7F3;
  --s1: #FFFFFF;
  --s2: #FDF2F8;
  --s3: #FBCFE8;
  --border: #F9D7E5;
  --border2: #EAB1C9;
  --text: #1A0A14;
  --text2: #5C2E45;
  --text3: #946078;
  --accent: #DB2777;
  --accent2: #FB7185;
  --accent-grad: linear-gradient(135deg, #FB7185 0%, #DB2777 100%);
  --accent-grad-soft: linear-gradient(135deg, #FECDD3 0%, #FB7185 100%);
  --accent-shadow: rgba(219,39,119,.28);
  --accent-bg: rgba(244,114,182,.10);
  --accent-text: #FFFFFF;
  --red: #DC2626;
  --red-bg: rgba(220,38,38,.10);
  --amber: #D97706;
  --amber-bg: rgba(217,119,6,.10);
  --green: #059669;
  --green-bg: rgba(5,150,105,.10);
  --blue: #2563EB;
  --shadow: 0 8px 24px rgba(150,40,80,.10);
  --shadow-lg: 0 18px 50px rgba(150,40,80,.20);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button, input, textarea, select { font-family: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; padding: 0; }
a { color: var(--accent); text-decoration: none; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── AUTH SCREEN ── */
.auth-overlay {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(244,114,182,.10) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(219,39,119,.10) 0%, transparent 55%),
    linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 32px 20px;
}
.auth-card {
  width: 100%; max-width: 440px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 38px 32px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.auth-logo {
  width: 72px; height: 72px;
  margin: 0 auto 18px;
  border-radius: 18px;
  background: var(--accent-grad);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 30px var(--accent-shadow);
  position: relative;
}
.auth-logo::after {
  content: '';
  position: absolute;
  top: -4px; right: -4px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--accent2);
}
.auth-logo svg { width: 32px; height: 32px; }
.auth-title {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
  display: inline-flex; align-items: baseline; gap: 3px;
  margin-bottom: 8px;
}
.auth-title-text {
  background: var(--accent-grad);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.auth-title-dot { color: var(--accent); }
.auth-sub {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 30px;
  line-height: 1.55;
}
.auth-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent-grad);
  color: #fff;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
  box-shadow: 0 10px 26px var(--accent-shadow);
  transition: transform .15s var(--easing);
}
.auth-btn:hover { transform: translateY(-2px); }
.auth-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 24px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
}
.auth-back:hover { border-color: var(--accent); color: var(--text); }

/* ── MAIN SHELL ── */
.shell {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  padding: 18px 14px 14px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.brand {
  display: flex; align-items: baseline; gap: 3px;
  font-weight: 900;
  font-size: 22px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.brand-text {
  background: var(--accent-grad);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.brand-dot { color: var(--accent); }
.icon-btn {
  width: 34px; height: 34px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all .12s var(--easing);
}
.icon-btn:hover { background: var(--s2); color: var(--text); border-color: var(--accent); }

.side-stats {
  margin: 0 12px 14px;
  padding: 14px 14px 12px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.side-stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
}
.side-stat-row + .side-stat-row { border-top: 1px dashed var(--border); margin-top: 2px; padding-top: 8px; }
.side-stat-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
}
.side-stat-value {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
}
.side-stat-value.accent {
  background: var(--accent-grad);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}

.nav-section {
  padding: 0 8px;
  flex: 1;
  overflow-y: auto;
}
.nav-section + .nav-section { margin-top: 6px; }
.nav-title {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 10px 4px;
}
.nav-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 10px;
  color: var(--text2);
  border-radius: 9px;
  font-size: 13px;
  font-weight: 600;
  text-align: left;
  transition: all .1s var(--easing);
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--s1); color: var(--text); }
.nav-item.active {
  background: var(--accent-bg);
  color: var(--text);
}
.nav-item-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-item-name { flex: 1; }
.nav-item-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 99px;
  background: var(--accent);
  color: var(--accent-text);
}

.sidebar-foot {
  padding: 10px 12px 14px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.hub-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 9px 14px;
  background: var(--accent-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: all .15s var(--easing);
}
.hub-btn:hover { background: var(--accent-grad); color: #fff; }

/* ── MAIN PANE ── */
.main {
  flex: 1;
  background: var(--bg);
  overflow-y: auto;
  position: relative;
}

.main-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 36px 36px 100px;
}

.page-head {
  margin-bottom: 28px;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 18px;
  flex-wrap: wrap;
}
.page-greeting {
  font-family: var(--hand);
  font-size: 22px;
  color: var(--text2);
  margin-bottom: 2px;
  line-height: 1;
}
.page-title {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -.01em;
  line-height: 1.1;
}
.btn-primary {
  padding: 11px 20px;
  background: var(--accent-grad);
  color: #fff;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .04em;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 22px var(--accent-shadow);
  transition: transform .12s var(--easing);
}
.btn-primary:hover { transform: translateY(-2px); }

/* ── BIRTHDAY HERO ── */
.bday-hero {
  position: relative;
  background:
    radial-gradient(ellipse at top right, rgba(244,114,182,.25) 0%, transparent 60%),
    radial-gradient(ellipse at bottom left, rgba(251,113,133,.20) 0%, transparent 60%),
    var(--accent-grad);
  border-radius: 28px;
  padding: 32px 36px;
  margin-bottom: 30px;
  color: #fff;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s var(--easing), box-shadow .2s var(--easing);
  display: flex; align-items: center; gap: 26px;
  box-shadow: 0 22px 50px var(--accent-shadow);
}
.bday-hero:hover { transform: translateY(-3px); box-shadow: 0 30px 70px var(--accent-shadow); }
.bday-hero-photo {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 3px solid #fff;
  background: var(--s1);
  background-size: cover;
  background-position: center;
  flex-shrink: 0;
  font-size: 44px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
  animation: photoFloat 3s ease-in-out infinite;
}
@keyframes photoFloat {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50%      { transform: translateY(-6px) rotate(2deg); }
}
.bday-hero-info { flex: 1; min-width: 0; }
.bday-hero-emoji {
  font-size: 18px;
  font-family: var(--hand);
  letter-spacing: .04em;
  opacity: .9;
  margin-bottom: 4px;
}
.bday-hero-name {
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 6px;
  letter-spacing: -.01em;
  line-height: 1;
}
.bday-hero-age {
  font-size: 16px;
  font-weight: 700;
  opacity: .9;
}
.bday-hero-arrow {
  font-size: 32px;
  font-weight: 800;
  opacity: .8;
  transition: transform .15s var(--easing);
}
.bday-hero:hover .bday-hero-arrow { transform: translateX(8px); opacity: 1; }

/* Confetti overlay */
.confetti {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  top: -10px;
  animation: confettiFall linear infinite;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); }
}

/* ── SECTION ── */
.section {
  margin-bottom: 36px;
}
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-size: 18px;
  font-weight: 800;
  display: flex; align-items: center; gap: 10px;
}
.section-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--s2);
  padding: 3px 9px;
  border-radius: 99px;
  font-weight: 700;
}

/* ── REACH OUT LIST ── */
.reach-list {
  display: flex; flex-direction: column;
  gap: 10px;
}
.reach-item {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 18px;
  display: flex; align-items: center;
  gap: 14px;
  transition: all .15s var(--easing);
  text-align: left;
  width: 100%;
}
.reach-item:hover {
  border-color: var(--accent);
  box-shadow: 0 6px 20px var(--accent-shadow);
  transform: translateX(2px);
}
.reach-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  flex-shrink: 0;
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-weight: 800;
  position: relative;
}
.reach-info { flex: 1; min-width: 0; }
.reach-name {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 2px;
}
.reach-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .03em;
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.reach-overdue {
  background: var(--red-bg);
  color: var(--red);
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
}
.reach-soon {
  background: var(--amber-bg);
  color: var(--amber);
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
}
.reach-fresh {
  background: var(--green-bg);
  color: var(--green);
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
}
.reach-actions {
  display: flex; gap: 6px;
  flex-shrink: 0;
}
.quick-btn {
  width: 36px; height: 36px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: all .12s var(--easing);
}
.quick-btn:hover { background: var(--s2); color: var(--text); border-color: var(--accent); }
.quick-btn.done { background: var(--green-bg); color: var(--green); border-color: var(--green); }

/* ── UPCOMING BDAYS ── */
.upcoming-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.upcoming-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all .15s var(--easing);
}
.upcoming-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 10px 24px var(--accent-shadow);
}
.upcoming-avatar {
  width: 64px; height: 64px;
  margin: 0 auto 10px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  font-size: 28px;
  color: var(--text2);
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--border);
}
.upcoming-name {
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.upcoming-when {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .04em;
}
.upcoming-when.tomorrow { color: var(--amber); font-weight: 800; }
.upcoming-when.soon { color: var(--accent); font-weight: 800; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 50px 24px;
  color: var(--text3);
}
.empty-icon { font-size: 56px; margin-bottom: 14px; opacity: .5; }
.empty-title { font-size: 16px; font-weight: 800; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; max-width: 360px; margin: 0 auto; line-height: 1.55; }

/* ── CONTACTS LIST PAGE ── */
.contacts-toolbar {
  display: flex; gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}
.search-wrap {
  flex: 1; min-width: 220px;
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 14px 11px 40px;
  font-size: 14px;
  outline: none;
  transition: border-color .15s var(--easing);
  color: var(--text);
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
}
.filter-chips {
  display: flex; gap: 6px;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 8px 14px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  transition: all .12s var(--easing);
}
.filter-chip:hover { color: var(--text); }
.filter-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.contacts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.contact-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  cursor: pointer;
  transition: all .15s var(--easing);
  text-align: left;
  width: 100%;
  position: relative;
}
.contact-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 12px 28px var(--accent-shadow);
}
.contact-card-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-weight: 800;
  margin-bottom: 12px;
}
.contact-card-name {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 4px;

.bday-name {

/* ── MODALS ── */
.modal-bg {
  display: none;

  inset: 0;

}
.modal-bg.open { display: flex; }
.modal {
  width: 100%; max-width: 560px;

/* Toast */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--s1);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 11px 22px;
  border-radius: 99px;
  font-size: 13px;

.toast.error { border-color: var(--red); }
.toast.success { border-color: var(--green); }

/* In-app birthday banner */
.bday-banner {
  position: fixed;
  top: 14px; left: 50%;

  background: var(--accent-grad);
  color: #fff;
  padding: 10px 20px;
  border-radius: 99px;

.mobile-hamburger {

}

<script>
'use strict';

/* ============================================================

const COLLECTION = 'orbits';

const VIEW_KEY = 'orbit_view';
const NOTIF_KEY = 'orbit_last_notif_date';

const CIRCLES = {

  close:        { name: 'Близкие',  icon: '✨', defaultInterval: 14, cls: 'circle-close' },

/* ============================================================

let state = {

const uuid = () => crypto.randomUUID();

/* ============================================================
   DATE UTILS
   ============================================================ */
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayMD() {
  const d = new Date();
  return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseBday(b) {
  if (!b) return null;
  // Supports YYYY-MM-DD or MM-DD
  const parts = b.split('-');
  if (parts.length === 3) return { year: +parts[0], month: +parts[1], day: +parts[2] };
  if (parts.length === 2) return { year: null, month: +parts[0], day: +parts[1] };
  return null;
}
function daysUntilBday(bday) {
  const b = parseBday(bday);
  if (!b) return null;
  const now = new Date();
  let target = new Date(now.getFullYear(), b.month - 1, b.day);
  if (target < now.setHours(0,0,0,0)) target = new Date(now.getFullYear() + 1, b.month - 1, b.day);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((target - today) / (1000*60*60*24));
}
function isBdayToday(bday) {
  const b = parseBday(bday);
  if (!b) return false;
  const now = new Date();
  return b.month === now.getMonth() + 1 && b.day === now.getDate();
}
function ageOn(bday, refDate) {
  const b = parseBday(bday);
  if (!b || !b.year) return null;
  const r = refDate || new Date();
  let age = r.getFullYear() - b.year;
  const mNow = r.getMonth() + 1;
  if (mNow < b.month || (mNow === b.month && r.getDate() < b.day)) age--;
  return age;
}
function daysSince(ts) {
  if (!ts) return Infinity;
  return Math.floor((Date.now() - ts) / (1000*60*60*24));
}
function formatRelativeDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const now = new Date();
  const diff = Math.floor((now - d) / (1000*60*60*24));
  if (diff === 0) return 'сегодня';
  if (diff === 1) return 'вчера';
  if (diff < 7) return `${diff}д назад`;
  if (diff < 30) return `${Math.floor(diff/7)}н назад`;
  if (diff < 365) return `${Math.floor(diff/30)}мес назад`;
  return `${Math.floor(diff/365)}г назад`;
}
function formatFullDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

/* ============================================================
   FIREBASE
   ============================================================ */
const fb = { auth: null, db: null, googleProvider: null };
try {
  if (typeof firebase !== 'undefined' && firebase.app) {
    fb.auth = firebase.auth();
    fb.db = firebase.firestore();
    fb.googleProvider = new firebase.auth.GoogleAuthProvider();

} catch(e) { console.error('FB services', e); }

function fbReady() { return !!(fb.auth && fb.db); }

function authSignIn() {
  if (!fbReady()) { toast('Firebase не загрузился', 'error'); return; }
  fb.auth.signInWithPopup(fb.googleProvider).catch(err => {
    if (err.code !== 'auth/popup-closed-by-user') toast('Ошибка входа: ' + err.message, 'error');
  });
}

if (fb.auth) {
  fb.auth.onAuthStateChanged(async user => {
    currentUser = user;
    if (!user) {
      document.getElementById('auth-overlay').style.display = 'flex';
      document.getElementById('shell').style.display = 'none';
      return;
    }
    await loadData();
    document.getElementById('auth-overlay').style.display = 'none';

}

async function loadData() {
  try {
    const doc = await fb.db.collection(COLLECTION).doc(currentUser.uid).get();
    if (doc.exists) {
      const data = doc.data();
      state = Object.assign(state, data.state || {});
      lastSyncedAt = data.updatedAt || 0;
    }
  } catch (e) {
    console.error('Load failed', e);
    toast('Не удалось загрузить данные', 'error');
  }
}

function queueSave() {
  if (isApplyingRemote || !currentUser) return;
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (!currentUser) return;
    try {
      const now = Date.now();
      lastSyncedAt = now;
      await fb.db.collection(COLLECTION).doc(currentUser.uid).set({
        state: JSON.parse(JSON.stringify(state)),
        updatedAt: now
      });
    } catch (e) { console.error('Save failed', e); toast('Ошибка сохранения', 'error'); }
  }, 800);
}

function subscribeRemote() {
  if (!currentUser) return;
  if (remoteUnsub) remoteUnsub();
  remoteUnsub = fb.db.collection(COLLECTION).doc(currentUser.uid).onSnapshot(doc => {
    if (!doc.exists) return;
    const data = doc.data();
    if ((data.updatedAt || 0) <= lastSyncedAt) return;
    isApplyingRemote = true;
    state = Object.assign(state, data.state || {});
    lastSyncedAt = data.updatedAt || 0;
    render();
    isApplyingRemote = false;
  });
}

/* ============================================================
   AI — supports Groq (works in RU/BY) + Gemini (geo-blocked in RU)
   Auto-detects provider by API key prefix
   ============================================================ */
function detectAIProvider(key) {
  if (!key) return null;
  const k = key.trim();
  if (k.startsWith('gsk_')) return 'groq';
  if (k.startsWith('sk-or-')) return 'openrouter';
  if (k.startsWith('AIza')) return 'gemini';
  // DeepSeek keys: sk-XXXXXXXX (32 hex chars), distinct from OpenAI sk-proj- format
  if (k.startsWith('sk-') && k.length >= 30 && k.length <= 60 && !k.startsWith('sk-proj-')) return 'deepseek';
  // Mistral keys: 32-char alphanumeric, no prefix
  if (/^[A-Za-z0-9]{32}$/.test(k)) return 'mistral';
  return null;
}

function buildGreetingPrompt(contact) {
  const age = ageOn(contact.birthday);
  const ageNew = age != null ? age + 1 : null;
  const circle = CIRCLES[contact.circle]?.name || 'знакомый';
  const interests = (contact.interests || []).join(', ');
  const occupation = contact.occupation || '';
  const tone = contact.circle === 'family' ? 'тёплый, личный'

             : contact.circle === 'friend' ? 'дружелюбный'

  let p = 'Ты — друг, который пишет короткое, тёплое, искреннее поздравление с днём рождения по-русски для конкретного человека.\n\n';
  p += 'КОГО ПОЗДРАВЛЯЕМ:\n';
  p += `- Имя: ${contact.name}\n`;
  p += `- Кто он/она: ${circle}\n`;
  if (ageNew) p += `- Исполняется: ${ageNew} лет\n`;
  if (interests) p += `- Интересы/хобби: ${interests}\n`;
  if (occupation) p += `- Чем занимается: ${occupation}\n`;
  if (contact.notes) p += `- Заметки о человеке: ${contact.notes}\n`;
  p += '\nТРЕБОВАНИЯ:\n';
  p += '- 2-4 предложения максимум\n';
  p += '- БЕЗ штампов типа "счастья здоровья успехов в делах"\n';
  p += '- Учти контекст (хобби, профессию) если есть\n';
  p += `- Тон ${tone}\n`;
  p += '- Пиши от первого лица, как будто я лично поздравляю\n';
  p += '- Не используй смайлики/эмодзи\n';
  p += '- ТОЛЬКО текст поздравления, без преамбулы\n\nПоздравление:';
  return p;
}

async function callGroq(key, prompt) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'user', content: prompt }],
      temperature: 1.0,
      max_tokens: 400
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content?.trim();
}

async function callGemini(key, prompt) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(key)}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 1.0, maxOutputTokens: 400 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
}

async function callOpenRouter(key, prompt) {
  // Try models in fallback order — if first fails (overloaded/down), try next
  const models = [
    'meta-llama/llama-3.1-8b-instruct:free',
    'google/gemma-2-9b-it:free',
    'mistralai/mistral-7b-instruct:free',
    'meta-llama/llama-3.3-70b-instruct:free'
  ];
  let lastErr = '';
  for (const model of models) {
    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + key,
          'Content-Type': 'application/json',
          'HTTP-Referer': 'https://zsklnskky.github.io/',
          'X-Title': 'ORBIT'
        },
        body: JSON.stringify({
          model,
          messages: [{ role: 'user', content: prompt }],
          temperature: 1.0,
          max_tokens: 400
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) {
        const m = data.error?.message || `HTTP ${res.status}`;
        const raw = data.error?.metadata?.raw || '';
        lastErr = `${model.split('/')[1]}: ${m}${raw ? ' [' + raw.slice(0, 80) + ']' : ''}`;
        console.warn('OpenRouter model failed:', model, m, raw);
        continue; // try next model
      }
      const text = data.choices?.[0]?.message?.content?.trim();
      if (text) {
        console.log('✓ Used model:', model);
        return text;
      }
      lastErr = `${model.split('/')[1]}: empty response`;
    } catch (e) {
      lastErr = `${model.split('/')[1]}: ${e.message}`;
      console.warn('OpenRouter fetch error:', model, e);
    }
  }
  throw new Error(lastErr || 'Все free модели недоступны');
}

async function callDeepSeek(key, prompt) {
  const res = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',

    body: JSON.stringify({

}

async function callMistral(key, prompt) {
  const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({

    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content?.trim();
}

async function generateGreeting(contact) {
  const key = (state.settings.geminiApiKey || '').trim();
  if (!key) return { error: 'NO_KEY' };
  const provider = detectAIProvider(key);
  if (!provider) return { error: 'Неизвестный формат ключа. Groq: gsk_..., OpenRouter: sk-or-..., DeepSeek: sk-..., Gemini: AIza...' };
  const prompt = buildGreetingPrompt(contact);
  try {
    let text;
    if (provider === 'groq') text = await callGroq(key, prompt);
    else if (provider === 'openrouter') text = await callOpenRouter(key, prompt);
    else if (provider === 'deepseek') text = await callDeepSeek(key, prompt);
    else if (provider === 'mistral') text = await callMistral(key, prompt);
    else text = await callGemini(key, prompt);
    if (!text) return { error: 'Пустой ответ от ' + provider };
    return { text };
  } catch (e) {
    return { error: e.message };
  }
}

async function requestNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const p = await Notification.requestPermission();
  return p === 'granted';
}

function showBrowserNotification(contact) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const age = ageOn(contact.birthday);
  const body = age ? `Исполняется ${age + 1} лет — открой ORBIT, чтобы поздравить` : 'Открой ORBIT, чтобы поздравить';

function notifyTodayBdays() {
  const todays = state.contacts.filter(c => isBdayToday(c.birthday));
  if (!todays.length) return;

  // In-app banner
  const banner = document.getElementById('bday-banner');
  banner.innerHTML = `🎂 Сегодня день рождения у ${todays.map(c => esc(c.name)).join(', ')} — нажми чтобы поздравить →`;
  banner.classList.add('show');
  banner.onclick = () => openBdayView(todays[0].id);

  // Browser notifications (only once per day)
  const last = localStorage.getItem(NOTIF_KEY);
  if (last !== todayKey()) {
    todays.forEach(c => showBrowserNotification(c));
    localStorage.setItem(NOTIF_KEY, todayKey());
  }
}

/* ============================================================
   IMAGE COMPRESSION
   ============================================================ */
async function compressImage(file, maxSize = 240, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

    p.style.opacity = 0.7 + Math.random() * 0.3;

    if (i % 5 === 0) p.style.transform = 'rotate(' + (Math.random()*360) + 'deg)';
    container.appendChild(p);
  }
}

/* ============================================================
   COMPUTED — overdue contacts, upcoming bdays
   ============================================================ */
function getOverdue() {
  const arr = [];
  state.contacts.forEach(c => {
    if (c.archived) return;
    if (!c.lastInteraction) {
      arr.push({ contact: c, daysOverdue: 999, sortKey: 999 });
      return;
    }
    const days = daysSince(c.lastInteraction);
    const overdue = days - (c.interactionInterval || 30);
    if (overdue > 0) {
      arr.push({ contact: c, daysOverdue: overdue, sortKey: overdue });
    }
  });
  arr.sort((a, b) => b.sortKey - a.sortKey);
  return arr;
}

function getUpcomingBdays(daysAhead = 30) {
  return state.contacts
    .filter(c => !c.archived && c.birthday)
    .map(c => ({ contact: c, days: daysUntilBday(c.birthday) }))
    .filter(x => x.days != null && x.days <= daysAhead && x.days > 0)
    .sort((a, b) => a.days - b.days);
}

function getTodayBdays() {
  return state.contacts.filter(c => !c.archived && isBdayToday(c.birthday));
}

/* ============================================================
   RENDER — Today view
   ============================================================ */
function avatarHtml(c, size = 'medium') {
  const bg = c.photoURL ? `style="background-image:url('${esc(c.photoURL)}')"` : '';
  const initials = (c.name || '?').split(/\s+/).map(p => p[0] || '').join('').slice(0,2).toUpperCase();
  return `<div class="${size === 'big' ? 'bday-photo' : size === 'detail' ? 'detail-photo' : size === 'small' ? 'upcoming-avatar' : size === 'reach' ? 'reach-avatar' : 'contact-card-avatar'}" ${bg}>${c.photoURL ? '' : esc(initials)}</div>`;
}

function renderToday() {
  const todays = getTodayBdays();
  const overdue = getOverdue().slice(0, 8);
  const upcoming = getUpcomingBdays(30).slice(0, 8);

  const hour = new Date().getHours();
  const greeting = hour < 6 ? 'Привет ночи' : hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';
  const fn = currentUser?.displayName?.split(' ')[0] || 'друг';

  let html = `
    <div class="page-head">
      <div>
        <div class="page-greeting">${greeting},</div>
        <div class="page-title">${esc(fn)} 👋</div>
      </div>
      <button class="btn-primary" id="new-contact-btn">+ Контакт</button>
    </div>
  `;

  // Today's bdays — hero card(s)
  if (todays.length) {
    html += todays.map(c => {
      const age = ageOn(c.birthday);
      return `
        <div class="bday-hero" data-bday-id="${esc(c.id)}">
          <div class="confetti" id="confetti-${esc(c.id)}"></div>
          ${avatarHtml(c, 'reach').replace('reach-avatar', 'bday-hero-photo')}
          <div class="bday-hero-info">
            <div class="bday-hero-emoji">🎂 Сегодня день рождения у</div>
            <div class="bday-hero-name">${esc(c.name)}</div>
            ${age != null ? `<div class="bday-hero-age">Исполняется ${age + 1}${c.knownSince ? ` · знакомы ${new Date().getFullYear() - c.knownSince}г` : ''}</div>` : ''}
          </div>
          <div class="bday-hero-arrow">→</div>
        </div>
      `;
    }).join('');
  }

  // Who to reach out to
  html += `
    <div class="section">
      <div class="section-head">
        <div class="section-title">📨 Кому написать сегодня</div>
        ${overdue.length ? `<span class="section-count">${overdue.length}</span>` : ''}
      </div>
      ${overdue.length ? `<div class="reach-list">
        ${overdue.map(({ contact, daysOverdue }) => renderReachItem(contact, daysOverdue)).join('')}
      </div>` : `<div class="empty">
        <div class="empty-icon">🎉</div>
        <div class="empty-title">Никто не забыт</div>
        <div class="empty-sub">Все на связи. Можно расслабиться!</div>
      </div>`}
    </div>
  `;

  // Upcoming bdays
  if (upcoming.length) {
    html += `
      <div class="section">
        <div class="section-head">
          <div class="section-title">🎂 Скоро дни рождения</div>
          <span class="section-count">${upcoming.length}</span>
        </div>
        <div class="upcoming-grid">
          ${upcoming.map(({ contact, days }) => {
            const whenClass = days === 1 ? 'tomorrow' : days <= 7 ? 'soon' : '';
            const whenText = days === 1 ? 'Завтра!' : days <= 7 ? `Через ${days}д` : `Через ${days}д`;
            return `
              <button class="upcoming-card" data-contact-id="${esc(contact.id)}">
                ${avatarHtml(contact, 'small')}
                <div class="upcoming-name">${esc(contact.name)}</div>
                <div class="upcoming-when ${whenClass}">${whenText}</div>
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  // Empty state if no contacts
  if (!state.contacts.length) {
    html += `
      <div class="empty">
        <div class="empty-icon">🪐</div>
        <div class="empty-title">Начнём с близких</div>
        <div class="empty-sub">Добавь маму, лучшего друга или коллегу — ORBIT будет напоминать поддерживать связь и не забыть про дни рождения.</div>
        <div style="margin-top:18px"><button class="btn-primary" id="first-add-btn">+ Добавить контакт</button></div>
      </div>
    `;
  }

  document.getElementById('main-content').innerHTML = html;

  // Wire up
  document.getElementById('new-contact-btn').onclick = () => openEditModal(null);
  const first = document.getElementById('first-add-btn');
  if (first) first.onclick = () => openEditModal(null);
  document.querySelectorAll('[data-bday-id]').forEach(el => {
    el.onclick = () => openBdayView(el.dataset.bdayId);
  });
  document.querySelectorAll('[data-contact-id]').forEach(el => {
    el.onclick = () => navigateTo('contact:' + el.dataset.contactId);
  });
  wireReachItems();

  // Start confetti for today's bdays
  todays.forEach(c => {
    const cont = document.getElementById('confetti-' + c.id);
    if (cont) startConfetti(cont);
  });
}

function renderReachItem(c, daysOverdue) {
  const lastDays = daysSince(c.lastInteraction);
  const interval = c.interactionInterval || 30;
  const sub = c.lastInteraction
    ? `${formatRelativeDate(c.lastInteraction)} · цель: каждые ${interval}д`
    : 'ещё не общались';
  const badge = daysOverdue > 30
    ? `<span class="reach-overdue">${daysOverdue}д не общались</span>`
    : daysOverdue > 0
      ? `<span class="reach-soon">просрочено ${daysOverdue}д</span>`
      : '';
  return `
    <button class="reach-item" data-contact-id="${esc(c.id)}">
      ${avatarHtml(c, 'reach')}
      <div class="reach-info">
        <div class="reach-name">${esc(c.name)}</div>
        <div class="reach-sub">${badge}<span>${esc(sub)}</span></div>
      </div>
      <div class="reach-actions">
        <button class="quick-btn" data-log-id="${esc(c.id)}" title="✓ Сегодня общались">✓</button>
      </div>
    </button>
  `;
}

function wireReachItems() {
  document.querySelectorAll('[data-contact-id]').forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest('[data-log-id]')) return;
      navigateTo('contact:' + el.dataset.contactId);
    };
  });
  document.querySelectorAll('[data-log-id]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      logInteraction(b.dataset.logId, 'other', '');
      b.classList.add('done');
      b.textContent = '✓';
      setTimeout(() => render(), 600);
    };
  });
}

let contactsFilter = 'all';
let contactsSearch = '';

  let list = state.contacts.filter(c => !c.archived);
  if (contactsFilter !== 'all') {
    if (contactsFilter === 'overdue') {
      const ids = new Set(getOverdue().map(x => x.contact.id));

      list = list.filter(c => c.circle === contactsFilter);

    const q = contactsSearch.toLowerCase();
    list = list.filter(c =>
      (c.name || '').toLowerCase().includes(q)
      || (c.occupation || '').toLowerCase().includes(q)
      || (c.notes || '').toLowerCase().includes(q)
      || (c.interests || []).some(i => i.toLowerCase().includes(q))

/* ============================================================
   RENDER — Birthdays calendar view
   ============================================================ */
function renderBirthdays() {
  const today = getTodayBdays();
  const upcoming = getUpcomingBdays(365);
  const grouped = {};
  upcoming.forEach(({ contact, days }) => {
    let bucket;
    if (days === 1) bucket = 'Завтра';
    else if (days <= 7) bucket = 'На этой неделе';
    else if (days <= 30) bucket = 'В этом месяце';
    else if (days <= 90) bucket = 'Ближайшие 3 месяца';
    else bucket = 'Позже';
    if (!grouped[bucket]) grouped[bucket] = [];
    grouped[bucket].push({ contact, days });
  });

  let html = `
    <div class="page-head">
      <div>
        <div class="page-greeting">никто не забыт</div>
        <div class="page-title">Дни рождения 🎂</div>
      </div>
    </div>
  `;

  if (today.length) {
    html += `<div class="section"><div class="section-head"><div class="section-title">🎉 Сегодня</div></div>`;
    today.forEach(c => {
      const age = ageOn(c.birthday);
      html += `
        <div class="bday-hero" data-bday-id="${esc(c.id)}" style="margin-bottom:12px">
          <div class="confetti" id="confetti-bd-${esc(c.id)}"></div>
          ${avatarHtml(c, 'reach').replace('reach-avatar', 'bday-hero-photo')}
          <div class="bday-hero-info">
            <div class="bday-hero-emoji">сегодня день рождения у</div>
            <div class="bday-hero-name">${esc(c.name)}</div>
            ${age != null ? `<div class="bday-hero-age">исполняется ${age + 1}</div>` : ''}
          </div>
          <div class="bday-hero-arrow">→</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  Object.entries(grouped).forEach(([bucket, arr]) => {
    html += `
      <div class="section">
        <div class="section-head">
          <div class="section-title">${bucket}</div>
          <span class="section-count">${arr.length}</span>
        </div>
        <div class="upcoming-grid">
          ${arr.map(({ contact, days }) => {
            const b = parseBday(contact.birthday);
            const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
            const dateStr = b ? `${b.day} ${months[b.month-1]}` : '';
            return `
              <button class="upcoming-card" data-contact-id="${esc(contact.id)}">
                ${avatarHtml(contact, 'small')}
                <div class="upcoming-name">${esc(contact.name)}</div>
                <div class="upcoming-when">${dateStr} · через ${days}д</div>
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });

  if (!today.length && !upcoming.length) {
    html += `<div class="empty">
      <div class="empty-icon">🎂</div>
      <div class="empty-title">Нет данных о днях рождения</div>
      <div class="empty-sub">Добавь даты рождения контактам — и ORBIT будет напоминать.</div>
    </div>`;
  }

  document.getElementById('main-content').innerHTML = html;
  document.querySelectorAll('[data-bday-id]').forEach(el => el.onclick = () => openBdayView(el.dataset.bdayId));
  document.querySelectorAll('[data-contact-id]').forEach(el => el.onclick = () => navigateTo('contact:' + el.dataset.contactId));
  today.forEach(c => {
    const cont = document.getElementById('confetti-bd-' + c.id);
    if (cont) startConfetti(cont);
  });
}

  const interactions = (c.interactions || []).slice().sort((a, b) => b.date - a.date);

  const knownYears = c.knownSince ? new Date().getFullYear() - c.knownSince : null;

          <button class="quick-btn" id="edit-btn" title="Редактировать">✎</button>

        ${c.birthday ? `<div class="bio-card"><div class="bio-label">День рождения</div><div class="bio-value">${formatBday(c.birthday)}${age != null ? ` · ${age} лет` : ''}</div></div>` : ''}
        ${knownYears != null ? `<div class="bio-card"><div class="bio-label">Знакомы</div><div class="bio-value">${knownYears} ${knownYears === 1 ? 'год' : knownYears < 5 ? 'года' : 'лет'}</div></div>` : ''}
        ${c.lastInteraction ? `<div class="bio-card"><div class="bio-label">Последнее общение</div><div class="bio-value">${formatRelativeDate(c.lastInteraction)}</div></div>` : ''}
        ${(c.interactions || []).length ? `<div class="bio-card"><div class="bio-label">Всего общений</div><div class="bio-value">${(c.interactions || []).length}</div></div>` : ''}
        ${c.interactionInterval ? `<div class="bio-card"><div class="bio-label">Цель</div><div class="bio-value">общаться каждые ${c.interactionInterval}д</div></div>` : ''}

    const topic = document.getElementById('log-topic-input').value.trim();
    logInteraction(id, logDraftType, topic);
    renderContactDetail(id);
    toast('Записано! 🎉', 'success');

}

function formatBday(b) {
  const p = parseBday(b);
  if (!p) return '';
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${p.day} ${months[p.month-1]}${p.year ? ` ${p.year}г` : ''}`;
}

function logInteraction(contactId, type, topic) {
  const c = state.contacts.find(x => x.id === contactId);
  if (!c) return;
  const now = Date.now();
  if (!c.interactions) c.interactions = [];
  c.interactions.unshift({ date: now, type, topic });
  c.lastInteraction = now;
  c.updated = now;
  queueSave();
}

/* ============================================================
   BIRTHDAY VIEW
   ============================================================ */
async function openBdayView(contactId) {
  const c = state.contacts.find(x => x.id === contactId);
  if (!c) return;
  currentBdayContactId = contactId;
  const view = document.getElementById('bday-view');
  view.classList.add('show');
  startConfetti(document.getElementById('bday-confetti'));
  renderBdayView(c);
}

function closeBdayView() {
  document.getElementById('bday-view').classList.remove('show');
  stopConfetti(document.getElementById('bday-confetti'));
  currentBdayContactId = null;
}

function renderBdayView(c) {
  const age = ageOn(c.birthday);
  const ageNew = age != null ? age + 1 : null;
  const knownYears = c.knownSince ? new Date().getFullYear() - c.knownSince : null;
  const cachedKey = c.id + '-' + todayKey();
  const cachedGreeting = greetingCache[cachedKey];

  document.getElementById('bday-view-inner').innerHTML = `
    <div class="bday-eyebrow">✨ Сегодня особенный день</div>
    <h1 class="bday-headline">С Днём Рождения!</h1>
    <div class="bday-photo-wrap">
      <div class="bday-photo-ring"></div>
      ${avatarHtml(c, 'big')}
    </div>
    <div class="bday-name">${esc(c.name)}</div>
    <div class="bday-meta">
      ${ageNew != null ? `<span class="pill big">${ageNew} лет</span>` : ''}
      ${knownYears != null ? `<span class="pill">знакомы ${knownYears}г</span>` : ''}
      <span class="pill">${CIRCLES[c.circle]?.icon || ''} ${esc(CIRCLES[c.circle]?.name || '')}</span>
    </div>

    <div class="greeting-card">
      <div class="greeting-card-head">
        <div class="greeting-card-title">— текст поздравления —</div>
        <div class="greeting-card-actions">
          <button class="quick-btn" id="greet-refresh-btn" title="Сгенерировать заново">↻</button>
          <button class="quick-btn" id="greet-copy-btn" title="Скопировать">📋</button>
        </div>
      </div>
      <div class="greeting-text" id="greeting-text">${cachedGreeting ? esc(cachedGreeting) : '<div class="greeting-loading">Gemini пишет персональное поздравление...</div>'}</div>
    </div>

    <div class="bday-actions">
      ${c.contact?.phone ? `<a class="bday-action primary" href="tel:${esc(c.contact.phone)}">📞 Позвонить</a>` : ''}
      ${c.contact?.telegram ? `<a class="bday-action" href="https://t.me/${esc(c.contact.telegram.replace('@',''))}" target="_blank">💬 Telegram</a>` : ''}
      ${c.contact?.email ? `<a class="bday-action" href="mailto:${esc(c.contact.email)}" target="_blank">✉️ Email</a>` : ''}
      <button class="bday-action" id="bday-log-btn">✓ Поздравил</button>
    </div>

    ${getBdayHistory(c).length ? `
      <div class="bday-history">
        <div class="bday-history-title">📜 Прошлые поздравления</div>
        ${getBdayHistory(c).map(h => `
          <div class="bday-history-item">
            <span class="bday-history-year">${h.year}г</span>
            ${esc(h.text)}
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;

  document.getElementById('greet-refresh-btn').onclick = () => loadGreeting(c, true);
  document.getElementById('greet-copy-btn').onclick = () => {
    const t = document.getElementById('greeting-text').textContent;
    if (t && !t.includes('пишет')) {
      navigator.clipboard.writeText(t);
      toast('Скопировано', 'success');
    }
  };
  document.getElementById('bday-log-btn').onclick = () => {
    logInteraction(c.id, 'other', '🎂 Поздравил с днём рождения');
    // Save greeting to history
    const text = document.getElementById('greeting-text').textContent;
    if (text && !text.includes('пишет')) saveBdayGreeting(c, text);
    toast('Записано! 🎉', 'success');
  };

  if (!cachedGreeting) loadGreeting(c);
}

async function loadGreeting(c, force) {
  const el = document.getElementById('greeting-text');
  if (!el) return;
  const key = c.id + '-' + todayKey();
  if (greetingCache[key] && !force) {
    el.textContent = greetingCache[key];
    return;
  }
  if (!state.settings.geminiApiKey) {
    el.innerHTML = `<div style="color:var(--amber)">
      ⚠ Чтобы Gemini генерировал поздравления — добавь API key в Настройках.<br>
      <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--accent)">Получить ключ (бесплатно) →</a>
    </div>`;
    return;
  }
  el.innerHTML = '<div class="greeting-loading">Gemini пишет персональное поздравление...</div>';
  const res = await generateGreeting(c);
  if (res.error) {
    el.innerHTML = `<div style="color:var(--red)">⚠ Ошибка: ${esc(res.error)}</div>`;
  } else {
    greetingCache[key] = res.text;
    el.textContent = res.text;
  }
}

function saveBdayGreeting(c, text) {
  if (!c.bdayGreetings) c.bdayGreetings = [];
  const year = new Date().getFullYear();
  const existing = c.bdayGreetings.find(g => g.year === year);
  if (existing) existing.text = text;
  else c.bdayGreetings.unshift({ year, text, date: Date.now() });
  queueSave();
}

function getBdayHistory(c) {
  return (c.bdayGreetings || []).slice(0, 5);
}

/* ============================================================
   CONFIRM
   ============================================================ */
function showConfirm(title, text, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-text').textContent = text;
  confirmCb = cb;
  document.getElementById('modal-confirm').classList.add('open');
}
document.getElementById('confirm-ok').onclick = () => {
  document.getElementById('modal-confirm').classList.remove('open');
  if (confirmCb) confirmCb();
  confirmCb = null;
};

/* ============================================================
   NAV
   ============================================================ */
function navigateTo(view) {
  currentView = view;
  try { localStorage.setItem(VIEW_KEY, view); } catch(e){}
  render();
  closeMobileSidebar();
  document.querySelector('.main').scrollTop = 0;
}
function render() {
  if (!currentUser) return;
  renderSidebar();
  if (currentView === 'today') renderToday();
  else if (currentView === 'contacts') renderContactsList();
  else if (currentView === 'birthdays') renderBirthdays();
  else if (currentView === 'settings') renderSettings();
  else if (currentView.startsWith('contact:')) renderContactDetail(currentView.slice(8));
  else renderToday();
}

function enterApp() {
  try {
    const last = localStorage.getItem(VIEW_KEY);
    if (last) currentView = last;
  } catch(e){}
  render();
  notifyTodayBdays();
  setTimeout(() => requestNotificationPermission(), 2000);
}

function closeMobileSidebar() {
  if (window.innerWidth <= 1024) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('open');
  }
}

/* ============================================================
   EVENT LISTENERS
   ============================================================ */
document.getElementById('auth-signin-btn').onclick = authSignIn;

document.getElementById('mobile-hamburger').onclick = () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-backdrop').classList.add('open');
};
document.getElementById('sidebar-backdrop').onclick = closeMobileSidebar;
document.getElementById('bday-close').onclick = closeBdayView;

document.addEventListener('click', e => {
  if (e.target.matches('[data-close]') || e.target.matches('.modal-bg')) {
    const m = e.target.closest('.modal-bg');
    if (m) m.classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-bg.open').forEach(m => m.classList.remove('open'));
    if (document.getElementById('bday-view').classList.contains('show')) closeBdayView();
  }
});

// On tab focus — re-check today (in case day changed)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && currentUser) {
    notifyTodayBdays();
    if (currentView === 'today') render();
  }
});
