<style>
:root {
  --font: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --hand: 'Caveat', cursive;
  --easing: cubic-bezier(.4,0,.2,1);
}

html[data-theme="dark"] {
  --bg: #16091B;
  --bg2: #1F0E26;
  --s1: #2B1632;
  --s2: #391E43;
  --s3: #4A2756;
  --border: #50315C;
  --border2: #6E4279;
  --text: #FFFFFF;
  --text2: #F4D6E3;
  --text3: #BD9CAE;
  --accent: #F472B6;
  --accent2: #FB7185;
  --accent-grad: linear-gradient(135deg, #FB7185 0%, #DB2777 100%);
  --accent-grad-soft: linear-gradient(135deg, #FDA4AF 0%, #F472B6 100%);
  --accent-shadow: rgba(244,114,182,.32);
  --accent-bg: rgba(244,114,182,.14);
  --accent-text: #1A0A14;
  --red: #EF4444;
  --red-bg: rgba(239,68,68,.14);
  --amber: #FBBF24;
  --amber-bg: rgba(251,191,36,.14);
  --green: #34D399;
  --green-bg: rgba(52,211,153,.14);
  --blue: #60A5FA;
  --shadow: 0 10px 30px rgba(0,0,0,.45);
  --shadow-lg: 0 22px 56px rgba(0,0,0,.55);
}
html[data-theme="light"] {
  --bg: #FFF1F5;
  --bg2: #FCE7F3;
  --s1: #FFFFFF;
  --s2: #FDF2F8;
  --s3: #FBCFE8;
  --border: #F9D7E5;
  --border2: #EAB1C9;
  --text: #1A0A14;
  --text2: #5C2E45;
  --text3: #946078;
  --accent: #DB2777;
  --accent2: #FB7185;
  --accent-grad: linear-gradient(135deg, #FB7185 0%, #DB2777 100%);
  --accent-grad-soft: linear-gradient(135deg, #FECDD3 0%, #FB7185 100%);
  --accent-shadow: rgba(219,39,119,.28);
  --accent-bg: rgba(244,114,182,.10);
  --accent-text: #FFFFFF;
  --red: #DC2626;
  --red-bg: rgba(220,38,38,.10);
  --amber: #D97706;
  --amber-bg: rgba(217,119,6,.10);
  --green: #059669;
  --green-bg: rgba(5,150,105,.10);
  --blue: #2563EB;
  --shadow: 0 8px 24px rgba(150,40,80,.10);
  --shadow-lg: 0 18px 50px rgba(150,40,80,.20);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button, input, textarea, select { font-family: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; padding: 0; }
a { color: var(--accent); text-decoration: none; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── AUTH SCREEN ── */
.auth-overlay {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(244,114,182,.10) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(219,39,119,.10) 0%, transparent 55%),
    linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 32px 20px;
}
.auth-card {
  width: 100%; max-width: 440px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 38px 32px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.auth-logo {
  width: 72px; height: 72px;
  margin: 0 auto 18px;
  border-radius: 18px;
  background: var(--accent-grad);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 30px var(--accent-shadow);
  position: relative;
}
.auth-logo::after {
  content: '';
  position: absolute;
  top: -4px; right: -4px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--accent2);
}
.auth-logo svg { width: 32px; height: 32px; }
.auth-title {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
  display: inline-flex; align-items: baseline; gap: 3px;
  margin-bottom: 8px;
}
.auth-title-text {
  background: var(--accent-grad);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.auth-title-dot { color: var(--accent); }
.auth-sub {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 30px;
  line-height: 1.55;
}
.auth-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent-grad);
  color: #fff;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
  box-shadow: 0 10px 26px var(--accent-shadow);
  transition: transform .15s var(--easing);
}
.auth-btn:hover { transform: translateY(-2px); }
.auth-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 24px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
}
.auth-back:hover { border-color: var(--accent); color: var(--text); }

/* ── MAIN SHELL ── */
.shell {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  padding: 18px 14px 14px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.brand {
  display: flex; align-items: baseline; gap: 3px;
  font-weight: 900;
  font-size: 22px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.brand-text {
  background: var(--accent-grad);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.brand-dot { color: var(--accent); }
.icon-btn {
  width: 34px; height: 34px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all .12s var(--easing);
}
.icon-btn:hover { background: var(--s2); color: var(--text); border-color: var(--accent); }

.side-stats {
  margin: 0 12px 14px;
  padding: 14px 14px 12px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.side-stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
}
.side-stat-row + .side-stat-row { border-top: 1px dashed var(--border); margin-top: 2px; padding-top: 8px; }
.side-stat-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
}
.side-stat-value {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
}
.side-stat-value.accent {
  background: var(--accent-grad);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}

.nav-section {
  padding: 0 8px;
  flex: 1;
  overflow-y: auto;
}
.nav-section + .nav-section { margin-top: 6px; }
.nav-title {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 10px 4px;
}
.nav-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 12px;
  color: var(--text2);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  text-align: left;
  transition: all .1s var(--easing);
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--s1); color: var(--text); }
.nav-item.active {
  background: var(--accent-bg);
  color: var(--text);
}
.nav-item-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-item-name { flex: 1; }
.nav-item-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 99px;
  background: var(--accent);
  color: var(--accent-text);
}

.sidebar-foot {
  padding: 10px 12px 14px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.hub-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 9px 14px;
  background: var(--accent-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: all .15s var(--easing);
}
.hub-btn:hover { background: var(--accent-grad); color: #fff; }

/* ── MAIN PANE ── */
.main {
  flex: 1;
  background: var(--bg);
  overflow-y: auto;
  position: relative;
}

.main-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 36px 36px 100px;
}

.page-head {
  margin-bottom: 28px;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 18px;
  flex-wrap: wrap;
}
.page-greeting {
  font-family: var(--hand);
  font-size: 22px;
  color: var(--text2);
  margin-bottom: 2px;
  line-height: 1;
}
.page-title {
  font-size: 40px;
  font-weight: 900;
  letter-spacing: -.01em;
  line-height: 1.1;
}
.btn-primary {
  padding: 11px 20px;
  background: var(--accent-grad);
  color: #fff;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .04em;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 22px var(--accent-shadow);
  transition: transform .12s var(--easing);
}
.btn-primary:hover { transform: translateY(-2px); }

/* ── BIRTHDAY HERO ── */
.bday-hero {
  position: relative;
  background:
    radial-gradient(ellipse at top right, rgba(244,114,182,.25) 0%, transparent 60%),
    radial-gradient(ellipse at bottom left, rgba(251,113,133,.20) 0%, transparent 60%),
    var(--accent-grad);
  border-radius: 28px;
  padding: 32px 36px;
  margin-bottom: 30px;
  color: #fff;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s var(--easing), box-shadow .2s var(--easing);
  display: flex; align-items: center; gap: 26px;
  box-shadow: 0 22px 50px var(--accent-shadow);
}
.bday-hero:hover { transform: translateY(-3px); box-shadow: 0 30px 70px var(--accent-shadow); }
.bday-hero-photo {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 3px solid #fff;
  background: var(--s1);
  background-size: cover;
  background-position: center;
  flex-shrink: 0;
  font-size: 44px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
  animation: photoFloat 3s ease-in-out infinite;
}
@keyframes photoFloat {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50%      { transform: translateY(-6px) rotate(2deg); }
}
.bday-hero-info { flex: 1; min-width: 0; }
.bday-hero-emoji {
  font-size: 18px;
  font-family: var(--hand);
  letter-spacing: .04em;
  opacity: .9;
  margin-bottom: 4px;
}
.bday-hero-name {
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 6px;
  letter-spacing: -.01em;
  line-height: 1;
}
.bday-hero-age {
  font-size: 16px;
  font-weight: 700;
  opacity: .9;
}
.bday-hero-arrow {
  font-size: 32px;
  font-weight: 800;
  opacity: .8;
  transition: transform .15s var(--easing);
}
.bday-hero:hover .bday-hero-arrow { transform: translateX(8px); opacity: 1; }

/* Confetti overlay */
.confetti {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  top: -10px;
  animation: confettiFall linear infinite;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); }
}

/* ── SECTION ── */
.section {
  margin-bottom: 36px;
}
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-size: 20px;
  font-weight: 800;
  display: flex; align-items: center; gap: 10px;
}
.section-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--s2);
  padding: 3px 9px;
  border-radius: 99px;
  font-weight: 700;
}

/* ── REACH OUT LIST ── */
.reach-list {
  display: flex; flex-direction: column;
  gap: 10px;
}
.reach-item {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 18px;
  display: flex; align-items: center;
  gap: 14px;
  transition: all .15s var(--easing);
  text-align: left;
  width: 100%;
}
.reach-item:hover {
  border-color: var(--accent);
  box-shadow: 0 6px 20px var(--accent-shadow);
  transform: translateX(2px);
}
.reach-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  flex-shrink: 0;
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-weight: 800;
  position: relative;
}
.reach-info { flex: 1; min-width: 0; }
.reach-name {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 3px;
}
.reach-sub {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
  letter-spacing: .03em;
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.reach-overdue {
  background: var(--red-bg);
  color: var(--red);
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
}
.reach-soon {
  background: var(--amber-bg);
  color: var(--amber);
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
}
.reach-fresh {
  background: var(--green-bg);
  color: var(--green);
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
}
.reach-actions {
  display: flex; gap: 6px;
  flex-shrink: 0;
}
.quick-btn {
  width: 36px; height: 36px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: all .12s var(--easing);
}
.quick-btn:hover { background: var(--s2); color: var(--text); border-color: var(--accent); }
.quick-btn.done { background: var(--green-bg); color: var(--green); border-color: var(--green); }

/* ── UPCOMING BDAYS ── */
.upcoming-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.upcoming-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all .15s var(--easing);
}
.upcoming-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 10px 24px var(--accent-shadow);
}
.upcoming-avatar {
  width: 64px; height: 64px;
  margin: 0 auto 10px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  font-size: 28px;
  color: var(--text2);
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--border);
}
.upcoming-name {
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.upcoming-when {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .04em;
}
.upcoming-when.tomorrow { color: var(--amber); font-weight: 800; }
.upcoming-when.soon { color: var(--accent); font-weight: 800; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 50px 24px;
  color: var(--text3);
}
.empty-icon { font-size: 56px; margin-bottom: 14px; opacity: .5; }
.empty-title { font-size: 16px; font-weight: 800; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; max-width: 360px; margin: 0 auto; line-height: 1.55; }

/* ── CONTACTS LIST PAGE ── */
.contacts-toolbar {
  display: flex; gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}
.search-wrap {
  flex: 1; min-width: 220px;
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 14px 11px 40px;
  font-size: 14px;
  outline: none;
  transition: border-color .15s var(--easing);
  color: var(--text);
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
}
.filter-chips {
  display: flex; gap: 6px;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 8px 14px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  transition: all .12s var(--easing);
}
.filter-chip:hover { color: var(--text); }
.filter-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.contacts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.contact-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  cursor: pointer;
  transition: all .15s var(--easing);
  text-align: left;
  width: 100%;
  position: relative;
}
.contact-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 12px 28px var(--accent-shadow);
}
.contact-card-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-weight: 800;
  margin-bottom: 12px;
}
.contact-card-name {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.contact-card-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .03em;
}
.contact-card-circle {
  position: absolute;
  top: 14px; right: 14px;
  padding: 3px 8px;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.circle-family { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent); }
.circle-close { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }
.circle-friend { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.circle-acquaintance { background: var(--s2); color: var(--text3); border: 1px solid var(--border2); }

.bday-badge {
  position: absolute;
  top: 14px; left: 14px;
  background: var(--accent-grad);
  color: #fff;
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 800;
}

/* ── CONTACT DETAIL ── */
.detail-page {
  display: flex; flex-direction: column;
  gap: 24px;
}
.detail-head-row {
  display: flex; align-items: center; gap: 22px;
  padding: 24px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 22px;
}
.detail-photo {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  font-size: 44px;
  color: var(--text2);
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 3px solid var(--border);
}
.detail-info { flex: 1; min-width: 0; }
.detail-name {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 8px;
}
.detail-meta-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
}
.detail-meta-row .pill {
  background: var(--s2);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 99px;
  font-weight: 700;
}
.detail-actions {
  display: flex; gap: 8px;
  flex-shrink: 0;
}

.log-bar {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
}
.log-input-row {
  display: flex; gap: 8px;
  margin-bottom: 10px;
}
.log-type {
  display: flex; gap: 4px;
  flex-wrap: wrap;
}
.log-type-btn {
  padding: 6px 12px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  transition: all .12s var(--easing);
  display: inline-flex; align-items: center; gap: 5px;
}
.log-type-btn:hover { color: var(--text); }
.log-type-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.log-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 13px;
  outline: none;
  transition: border-color .15s var(--easing);
}
.log-input:focus { border-color: var(--accent); }
.log-save-btn {
  padding: 10px 18px;
  background: var(--accent-grad);
  color: #fff;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.bio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.bio-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
}
.bio-label {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-bottom: 8px;
}
.bio-value {
  font-size: 15px;
  font-weight: 600;
  word-break: break-word;
}
.bio-value.with-action {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}

.interests-row {
  display: flex; gap: 6px;
  flex-wrap: wrap;
}
.interest-chip {
  padding: 3px 10px;
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
}

.timeline {
  position: relative;
  padding-left: 22px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 6px; top: 4px; bottom: 4px;
  width: 2px;
  background: var(--border);
}
.timeline-item {
  position: relative;
  padding: 8px 0 8px 14px;
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: -22px; top: 14px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
}
.timeline-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .04em;
  margin-bottom: 3px;
  text-transform: uppercase;
  font-weight: 700;
}
.timeline-topic {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.timeline-type {
  display: inline-block;
  font-size: 11px;
  margin-right: 5px;
}

/* ── BIRTHDAY VIEW ── */
.bday-view {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(244,114,182,.25) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(251,113,133,.20) 0%, transparent 55%),
    linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
  z-index: 700;
  overflow-y: auto;
  display: none;
}
.bday-view.show { display: block; }
.bday-view-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 60px 24px 80px;
  text-align: center;
  position: relative;
}
.bday-close {
  position: fixed;
  top: 20px; right: 20px;
  width: 44px; height: 44px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  z-index: 800;
}
.bday-close:hover { background: var(--s2); border-color: var(--accent); }

.bday-eyebrow {
  font-family: var(--hand);
  font-size: 28px;
  color: var(--accent);
  margin-bottom: 4px;
}
.bday-headline {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -.02em;
  line-height: 1;
  background: var(--accent-grad);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  margin-bottom: 36px;
}

.bday-photo-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 24px;
}
.bday-photo {
  width: 220px; height: 220px;
  border-radius: 50%;
  background: var(--s1);
  background-size: cover;
  background-position: center;
  font-size: 90px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-weight: 800;
  position: relative;
  z-index: 2;
  box-shadow: 0 20px 60px var(--accent-shadow);
}
.bday-photo-ring {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #FB7185, #DB2777, #F472B6, #FECDD3, #FB7185);
  animation: ringSpin 4s linear infinite;
  z-index: 1;
}
.bday-photo-ring::before {
  content: '';
  position: absolute;
  inset: 8px;
  background: var(--bg);
  border-radius: 50%;
}
@keyframes ringSpin { to { transform: rotate(360deg); } }

.bday-name {
  font-size: 44px;
  font-weight: 900;
  margin-bottom: 6px;
  letter-spacing: -.01em;
}
.bday-meta {
  display: flex; justify-content: center; gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 38px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text2);
  letter-spacing: .03em;
}
.bday-meta .pill {
  background: var(--s1);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 99px;
  font-weight: 700;
}
.bday-meta .pill.big {
  background: var(--accent-grad);
  color: #fff;
  border-color: transparent;
  font-size: 14px;
  font-weight: 800;
}

.greeting-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 26px 28px;
  text-align: left;
  margin-bottom: 22px;
  position: relative;
}
.greeting-card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.greeting-card-title {
  font-family: var(--hand);
  font-size: 22px;
  color: var(--accent);
}
.greeting-card-actions {
  display: flex; gap: 6px;
}
.greeting-text {
  font-size: 16px;
  line-height: 1.7;
  color: var(--text);
  font-weight: 500;
  min-height: 60px;
  white-space: pre-wrap;
}
.greeting-loading {
  display: flex; align-items: center;
  gap: 12px;
  color: var(--text2);
  font-style: italic;
}
.greeting-loading::before {
  content: '';
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.bday-actions {
  display: flex; gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
.bday-action {
  padding: 14px 22px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .04em;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all .15s var(--easing);
  background: var(--s1);
  border: 1px solid var(--border);
  color: var(--text);
}
.bday-action:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px var(--accent-shadow);
}
.bday-action.primary {
  background: var(--accent-grad);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 10px 26px var(--accent-shadow);
}

.bday-history {
  text-align: left;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-top: 18px;
}
.bday-history-title {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .12em;
  font-weight: 700;
  margin-bottom: 10px;
}
.bday-history-item {
  padding: 8px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 13px;
}
.bday-history-item:last-child { border-bottom: none; }
.bday-history-year {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  font-weight: 700;
  margin-right: 8px;
}

/* Confetti raining on bday view */
.bday-confetti {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 750;
  overflow: hidden;
}

/* ── MODALS ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(8px);
  z-index: 900;
  padding: 24px;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  width: 100%; max-width: 560px;
  max-height: calc(100vh - 48px);
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 22px;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.modal-head {
  padding: 18px 22px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title { font-size: 16px; font-weight: 800; }
.modal-close-btn {
  width: 32px; height: 32px;
  color: var(--text2);
  font-size: 22px;
  border-radius: 8px;
}
.modal-close-btn:hover { background: var(--s2); color: var(--text); }
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 22px;
}
.modal-foot {
  padding: 14px 22px 18px;
  display: flex; gap: 10px; justify-content: flex-end;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.btn-ghost {
  padding: 10px 18px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
}
.btn-ghost:hover { background: var(--s2); }
.btn-danger {
  padding: 10px 18px;
  background: var(--red-bg);
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
}
.btn-danger:hover { background: var(--red); color: #fff; }

/* Form */
.field { margin-bottom: 14px; }
.field-label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.field-input, .field-textarea, .field-select {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  outline: none;
  color: var(--text);
  transition: border-color .12s var(--easing);
  font-family: inherit;
}
.field-input:focus, .field-textarea:focus, .field-select:focus { border-color: var(--accent); }
.field-textarea { resize: vertical; min-height: 80px; line-height: 1.55; }
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.field-photo {
  display: flex; align-items: center; gap: 14px;
}
.field-photo-preview {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  font-size: 24px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.circle-picker {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.circle-opt {
  padding: 10px 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  color: var(--text2);
  transition: all .12s var(--easing);
}
.circle-opt .ico { font-size: 18px; line-height: 1; }
.circle-opt:hover { color: var(--text); }
.circle-opt.active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--text);
}

.interval-slider-row {
  display: flex; align-items: center; gap: 12px;
}
.interval-slider-row input[type="range"] {
  flex: 1; accent-color: var(--accent);
}
.interval-value {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 800;
  min-width: 60px;
  text-align: right;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--s1);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 11px 22px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 700;
  box-shadow: var(--shadow-lg);
  z-index: 9999;
  opacity: 0;
  transition: transform .3s var(--easing), opacity .3s var(--easing);
  pointer-events: none;
  max-width: 92vw;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.error { border-color: var(--red); }
.toast.success { border-color: var(--green); }

/* In-app birthday banner */
.bday-banner {
  position: fixed;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  background: var(--accent-grad);
  color: #fff;
  padding: 10px 20px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 800;
  box-shadow: 0 10px 28px var(--accent-shadow);
  z-index: 600;
  cursor: pointer;
  display: none;
  align-items: center; gap: 8px;
  max-width: 90vw;
  animation: bannerDrop .4s var(--easing);
}
.bday-banner.show { display: flex; }
@keyframes bannerDrop {
  from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* ── WISHLIST ── */
.wish-header-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px 24px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}
.wish-header-info { flex: 1; min-width: 200px; }
.wish-header-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
.wish-header-sub { font-size: 13px; color: var(--text2); line-height: 1.55; }
.wish-share-btn {
  padding: 12px 22px;
  background: var(--accent-grad);
  color: #fff;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .04em;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 20px var(--accent-shadow);
}

.wish-list {
  display: flex; flex-direction: column;
  gap: 12px;
}
.wish-item {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px;
  display: flex; align-items: flex-start; gap: 16px;
  position: relative;
  transition: border-color .12s var(--easing);
}
.wish-item:hover { border-color: var(--border2); }
.wish-item-prio {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--accent-grad);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900;
  font-size: 14px;
  flex-shrink: 0;
  font-family: var(--mono);
}
.wish-item-prio.p1 { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); }
.wish-item-prio.p2 { background: linear-gradient(135deg, #FB7185 0%, #DB2777 100%); }
.wish-item-prio.p3 { background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%); }
.wish-item-prio.p4 { background: linear-gradient(135deg, #60A5FA 0%, #2563EB 100%); }
.wish-item-prio.p5 { background: var(--s3); color: var(--text2); }

.wish-item-main { flex: 1; min-width: 0; }
.wish-item-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 5px;
  display: flex; align-items: center; gap: 10px;
}
.wish-item-title a {
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px dashed var(--text3);
}
.wish-item-title a:hover { border-bottom-color: var(--accent); color: var(--accent); }
.wish-item-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.55;
  margin-bottom: 8px;
}
.wish-item-meta {
  display: flex; gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}
.wish-item-meta .pill {
  padding: 3px 9px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-weight: 700;
}
.wish-item-meta .pill.price {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}
.wish-item-actions {
  display: flex; gap: 6px;
  flex-shrink: 0;
  margin-left: auto;
}

.wish-reserved-badge {
  margin-top: 10px;
  padding: 8px 12px;
  background: var(--green-bg);
  border: 1px solid var(--green);
  color: var(--green);
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.wish-reservation-list {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px dashed var(--border);
}
.wish-reservation-row {
  display: flex; align-items: center;
  gap: 10px;
  padding: 5px 0;
  font-size: 13px;
}
.wish-rev-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--s2);
  background-size: cover;
  background-position: center;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 800;

<script>
'use strict';

/* ============================================================
   CONSTANTS
   ============================================================ */
const COLLECTION = 'orbits';
const THEME_KEY = 'orbit_theme';
const VIEW_KEY = 'orbit_view';
const NOTIF_KEY = 'orbit_last_notif_date';

const CIRCLES = {
  family:       { name: 'Семья',    icon: '❤️', defaultInterval: 7,  cls: 'circle-family' },
  close:        { name: 'Близкие',  icon: '✨', defaultInterval: 14, cls: 'circle-close' },
  friend:       { name: 'Друзья',   icon: '🤝', defaultInterval: 30, cls: 'circle-friend' },
  acquaintance: { name: 'Знакомые', icon: '👋', defaultInterval: 90, cls: 'circle-acquaintance' }
};

const INTERACTION_TYPES = {
  call:  { name: 'Звонок',     icon: '📞' },
  text:  { name: 'Сообщение',  icon: '💬' },
  meet:  { name: 'Встреча',    icon: '🤝' },
  other: { name: 'Другое',     icon: '✨' }
};

/* ============================================================
   STATE
   ============================================================ */
let state = {
  version: 1,
  contacts: [],
  settings: {
    geminiApiKey: '',
    notificationDaysBefore: 3,
    streak: 0,
    streakDate: null
  }
};
let currentUser = null;
let isApplyingRemote = false;
let lastSyncedAt = 0;
let saveTimer = null;
let remoteUnsub = null;

let currentView = 'today';   // today | contacts | contact:ID | settings
let editForm = null;
let confirmCb = null;
let currentBdayContactId = null;
let greetingCache = {};      // by contactId+date → text

const uuid = () => crypto.randomUUID();
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ============================================================
   DATE UTILS
   ============================================================ */
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayMD() {
  const d = new Date();
  return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseBday(b) {
  if (!b) return null;
  // Supports YYYY-MM-DD or MM-DD
  const parts = b.split('-');
  if (parts.length === 3) return { year: +parts[0], month: +parts[1], day: +parts[2] };
  if (parts.length === 2) return { year: null, month: +parts[0], day: +parts[1] };
  return null;
}
function daysUntilBday(bday) {
  const b = parseBday(bday);
  if (!b) return null;
  const now = new Date();
  let target = new Date(now.getFullYear(), b.month - 1, b.day);
  if (target < now.setHours(0,0,0,0)) target = new Date(now.getFullYear() + 1, b.month - 1, b.day);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((target - today) / (1000*60*60*24));
}
function isBdayToday(bday) {
  const b = parseBday(bday);
  if (!b) return false;
  const now = new Date();
  return b.month === now.getMonth() + 1 && b.day === now.getDate();
}
function ageOn(bday, refDate) {
  const b = parseBday(bday);
  if (!b || !b.year) return null;
  const r = refDate || new Date();
  let age = r.getFullYear() - b.year;
  const mNow = r.getMonth() + 1;
  if (mNow < b.month || (mNow === b.month && r.getDate() < b.day)) age--;
  return age;
}
function daysSince(ts) {
  if (!ts) return Infinity;
  return Math.floor((Date.now() - ts) / (1000*60*60*24));
}
function formatRelativeDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const now = new Date();
  const diff = Math.floor((now - d) / (1000*60*60*24));
  if (diff === 0) return 'сегодня';
  if (diff === 1) return 'вчера';
  if (diff < 7) return `${diff}д назад`;
  if (diff < 30) return `${Math.floor(diff/7)}н назад`;
  if (diff < 365) return `${Math.floor(diff/30)}мес назад`;
  return `${Math.floor(diff/365)}г назад`;
}
function formatFullDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

/* ============================================================
   FIREBASE
   ============================================================ */
const fb = { auth: null, db: null, googleProvider: null };
try {
  if (typeof firebase !== 'undefined' && firebase.app) {
    fb.auth = firebase.auth();
    fb.db = firebase.firestore();
    fb.googleProvider = new firebase.auth.GoogleAuthProvider();
  }
} catch(e) { console.error('FB services', e); }

function fbReady() { return !!(fb.auth && fb.db); }

function authSignIn() {
  if (!fbReady()) { toast('Firebase не загрузился', 'error'); return; }
  fb.auth.signInWithPopup(fb.googleProvider).catch(err => {
    if (err.code !== 'auth/popup-closed-by-user') toast('Ошибка входа: ' + err.message, 'error');
  });
}

if (fb.auth) {
  fb.auth.onAuthStateChanged(async user => {
    currentUser = user;
    if (!user) {
      document.getElementById('auth-overlay').style.display = 'flex';
      document.getElementById('shell').style.display = 'none';
      return;
    }
    await loadData();
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('shell').style.display = 'flex';
    subscribeRemote();
    enterApp();
  });
}

async function loadData() {
  try {
    const doc = await fb.db.collection(COLLECTION).doc(currentUser.uid).get();
    if (doc.exists) {
      const data = doc.data();
      state = Object.assign(state, data.state || {});
      lastSyncedAt = data.updatedAt || 0;
    }
  } catch (e) {
    console.error('Load failed', e);
    toast('Не удалось загрузить данные', 'error');
  }
}

function queueSave() {
  if (isApplyingRemote || !currentUser) return;
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (!currentUser) return;
    try {
      const now = Date.now();
      lastSyncedAt = now;
      await fb.db.collection(COLLECTION).doc(currentUser.uid).set({
        state: JSON.parse(JSON.stringify(state)),
        updatedAt: now
      });
    } catch (e) { console.error('Save failed', e); toast('Ошибка сохранения', 'error'); }
  }, 800);
}

function subscribeRemote() {
  if (!currentUser) return;
  if (remoteUnsub) remoteUnsub();
  remoteUnsub = fb.db.collection(COLLECTION).doc(currentUser.uid).onSnapshot(doc => {
    if (!doc.exists) return;
    const data = doc.data();
    if ((data.updatedAt || 0) <= lastSyncedAt) return;
    isApplyingRemote = true;
    state = Object.assign(state, data.state || {});
    lastSyncedAt = data.updatedAt || 0;
    render();
    isApplyingRemote = false;
  });
}

/* ============================================================
   AI — supports Groq (works in RU/BY) + Gemini (geo-blocked in RU)
   Auto-detects provider by API key prefix
   ============================================================ */
function detectAIProvider(key) {
  if (!key) return null;
  const k = key.trim();
  if (k.startsWith('gsk_')) return 'groq';
  if (k.startsWith('sk-or-')) return 'openrouter';
  if (k.startsWith('AIza')) return 'gemini';
  // DeepSeek keys: sk-XXXXXXXX (32 hex chars), distinct from OpenAI sk-proj- format
  if (k.startsWith('sk-') && k.length >= 30 && k.length <= 60 && !k.startsWith('sk-proj-')) return 'deepseek';
  // Mistral keys: 32-char alphanumeric, no prefix
  if (/^[A-Za-z0-9]{32}$/.test(k)) return 'mistral';
  return null;
}

function buildGreetingPrompt(contact) {
  const age = ageOn(contact.birthday);
  const ageNew = age != null ? age + 1 : null;
  const circle = CIRCLES[contact.circle]?.name || 'знакомый';
  const interests = (contact.interests || []).join(', ');
  const occupation = contact.occupation || '';
  const tone = contact.circle === 'family' ? 'тёплый, личный'
             : contact.circle === 'close' ? 'дружеский, можно с лёгким юмором'
             : contact.circle === 'friend' ? 'дружелюбный'
             : 'уважительный, тёплый';

  let p = 'Ты — друг, который пишет короткое, тёплое, искреннее поздравление с днём рождения по-русски для конкретного человека.\n\n';
  p += 'КОГО ПОЗДРАВЛЯЕМ:\n';
  p += `- Имя: ${contact.name}\n`;
  p += `- Кто он/она: ${circle}\n`;
  if (ageNew) p += `- Исполняется: ${ageNew} лет\n`;
  if (interests) p += `- Интересы/хобби: ${interests}\n`;
  if (occupation) p += `- Чем занимается: ${occupation}\n`;
  if (contact.notes) p += `- Заметки о человеке: ${contact.notes}\n`;
  p += '\nТРЕБОВАНИЯ:\n';
  p += '- 2-4 предложения максимум\n';
  p += '- БЕЗ штампов типа "счастья здоровья успехов в делах"\n';
  p += '- Учти контекст (хобби, профессию) если есть\n';
  p += `- Тон ${tone}\n`;
  p += '- Пиши от первого лица, как будто я лично поздравляю\n';
  p += '- Не используй смайлики/эмодзи\n';
  p += '- ТОЛЬКО текст поздравления, без преамбулы\n\nПоздравление:';
  return p;
}

async function callGroq(key, prompt) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'user', content: prompt }],
      temperature: 1.0,
      max_tokens: 400
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content?.trim();
}

async function callGemini(key, prompt) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(key)}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 1.0, maxOutputTokens: 400 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
}

async function callOpenRouter(key, prompt) {
  // Try models in fallback order — if first fails (overloaded/down), try next
  const models = [
    'meta-llama/llama-3.1-8b-instruct:free',
    'google/gemma-2-9b-it:free',
    'mistralai/mistral-7b-instruct:free',
    'meta-llama/llama-3.3-70b-instruct:free'
  ];
  let lastErr = '';
  for (const model of models) {
    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + key,
          'Content-Type': 'application/json',
          'HTTP-Referer': 'https://zsklnskky.github.io/',
          'X-Title': 'ORBIT'
        },
        body: JSON.stringify({
          model,
          messages: [{ role: 'user', content: prompt }],
          temperature: 1.0,
          max_tokens: 400
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) {
        const m = data.error?.message || `HTTP ${res.status}`;
        const raw = data.error?.metadata?.raw || '';
        lastErr = `${model.split('/')[1]}: ${m}${raw ? ' [' + raw.slice(0, 80) + ']' : ''}`;
        console.warn('OpenRouter model failed:', model, m, raw);
        continue; // try next model
      }
      const text = data.choices?.[0]?.message?.content?.trim();
      if (text) {
        console.log('✓ Used model:', model);
        return text;
      }
      lastErr = `${model.split('/')[1]}: empty response`;
    } catch (e) {
      lastErr = `${model.split('/')[1]}: ${e.message}`;
      console.warn('OpenRouter fetch error:', model, e);
    }
  }
  throw new Error(lastErr || 'Все free модели недоступны');
}

async function generateGreeting(contact) {
  const key = (state.settings.geminiApiKey || '').trim();
  if (!key) return { error: 'NO_KEY' };
  const provider = detectAIProvider(key);
  if (!provider) return { error: 'Неизвестный формат ключа. Groq: gsk_..., OpenRouter: sk-or-..., DeepSeek: sk-..., Gemini: AIza...' };
  const prompt = buildGreetingPrompt(contact);
  try {
    let text;
    if (provider === 'groq') text = await callGroq(key, prompt);
    else if (provider === 'openrouter') text = await callOpenRouter(key, prompt);
    else if (provider === 'deepseek') text = await callDeepSeek(key, prompt);
    else if (provider === 'mistral') text = await callMistral(key, prompt);
    else text = await callGemini(key, prompt);
    if (!text) return { error: 'Пустой ответ от ' + provider };
    return { text };
  } catch (e) {
    return { error: e.message };
  }
}

/* ============================================================
   IMAGE COMPRESSION
   ============================================================ */
async function compressImage(file, maxSize = 240, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function startConfetti(container) {
  container.innerHTML = '';
  const colors = ['#FB7185', '#F472B6', '#DB2777', '#FECDD3', '#F9A8D4', '#FFD700'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (3 + Math.random() * 3) + 's';
    p.style.animationDelay = Math.random() * 5 + 's';
    p.style.opacity = 0.7 + Math.random() * 0.3;
    if (i % 3 === 0) p.style.borderRadius = '50%';
    if (i % 5 === 0) p.style.transform = 'rotate(' + (Math.random()*360) + 'deg)';
    container.appendChild(p);
  }
}

/* ============================================================
   COMPUTED — overdue contacts, upcoming bdays
   ============================================================ */
function getOverdue() {
  const arr = [];
  state.contacts.forEach(c => {
    if (c.archived) return;
    if (!c.lastInteraction) {
      arr.push({ contact: c, daysOverdue: 999, sortKey: 999 });
      return;
    }
    const days = daysSince(c.lastInteraction);
    const overdue = days - (c.interactionInterval || 30);
    if (overdue > 0) {
      arr.push({ contact: c, daysOverdue: overdue, sortKey: overdue });
    }
  });
  arr.sort((a, b) => b.sortKey - a.sortKey);
  return arr;
}

function getUpcomingBdays(daysAhead = 30) {
  return state.contacts
    .filter(c => !c.archived && c.birthday)
    .map(c => ({ contact: c, days: daysUntilBday(c.birthday) }))
    .filter(x => x.days != null && x.days <= daysAhead && x.days > 0)
    .sort((a, b) => a.days - b.days);
}

function getTodayBdays() {
  return state.contacts.filter(c => !c.archived && isBdayToday(c.birthday));
}

    ? `<span class="reach-overdue">${daysOverdue}д не общались</span>`
    : daysOverdue > 0
      ? `<span class="reach-soon">просрочено ${daysOverdue}д</span>`

  return `
    <button class="reach-item" data-contact-id="${esc(c.id)}">
      ${avatarHtml(c, 'reach')}
      <div class="reach-info">
        <div class="reach-name">${esc(c.name)}</div>
        <div class="reach-sub">${badge}<span>${esc(sub)}</span></div>

function wireReachItems() {
  document.querySelectorAll('[data-contact-id]').forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest('[data-log-id]')) return;
      navigateTo('contact:' + el.dataset.contactId);

  document.querySelectorAll('[data-log-id]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      logInteraction(b.dataset.logId, 'other', '');
      b.classList.add('done');
      b.textContent = '✓';
      setTimeout(() => render(), 600);
    };
  });
}

  let list = state.contacts.filter(c => !c.archived);
  if (contactsFilter !== 'all') {
    if (contactsFilter === 'overdue') {
      const ids = new Set(getOverdue().map(x => x.contact.id));
      list = list.filter(c => ids.has(c.id));
    } else {
      list = list.filter(c => c.circle === contactsFilter);
    }
  }
  if (contactsSearch) {
    const q = contactsSearch.toLowerCase();
    list = list.filter(c =>
      (c.name || '').toLowerCase().includes(q)
      || (c.occupation || '').toLowerCase().includes(q)
      || (c.notes || '').toLowerCase().includes(q)
      || (c.interests || []).some(i => i.toLowerCase().includes(q))
    );
  }
  list.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ru'));

  const html = `
    <div class="page-head">
      <div>
        <div class="page-greeting">все люди в твоей орбите</div>
        <div class="page-title">Контакты</div>
      </div>
      <button class="btn-primary" id="new-contact-btn">+ Новый</button>
    </div>
    <div class="contacts-toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="contacts-search" placeholder="Поиск по имени, профессии, заметкам..." value="${esc(contactsSearch)}">
      </div>
    </div>
    <div class="filter-chips">
      <button class="filter-chip ${contactsFilter === 'all' ? 'active' : ''}" data-filter="all">Все · ${state.contacts.filter(c => !c.archived).length}</button>
      <button class="filter-chip ${contactsFilter === 'overdue' ? 'active' : ''}" data-filter="overdue">⚠ Стоит написать</button>
      ${Object.entries(CIRCLES).map(([k, v]) => `<button class="filter-chip ${contactsFilter === k ? 'active' : ''}" data-filter="${k}">${v.icon} ${v.name}</button>`).join('')}
    </div>
    ${list.length ? `<div class="contacts-grid" style="margin-top:18px">
      ${list.map(c => {
        const bdayToday = isBdayToday(c.birthday);
        const days = daysUntilBday(c.birthday);
        const subText = c.lastInteraction
          ? formatRelativeDate(c.lastInteraction)
          : 'ещё не общались';
        return `
          <button class="contact-card" data-contact-id="${esc(c.id)}">
            ${bdayToday ? `<span class="bday-badge">🎂 Сегодня!</span>` : ''}
            <span class="contact-card-circle ${CIRCLES[c.circle]?.cls || ''}">${CIRCLES[c.circle]?.icon || ''} ${esc(CIRCLES[c.circle]?.name || '')}</span>
            ${avatarHtml(c, 'medium')}
            <div class="contact-card-name">${esc(c.name)}</div>
            <div class="contact-card-sub">${esc(subText)}${days != null && days <= 14 && days > 0 ? ` · 🎂 через ${days}д` : ''}</div>
          </button>
        `;
      }).join('')}
    </div>` : `<div class="empty" style="margin-top:30px">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">${contactsSearch ? 'Не найдено' : 'Нет контактов'}</div>
      <div class="empty-sub">${contactsSearch ? 'Попробуй другой запрос' : 'Добавь первый контакт чтобы начать'}</div>
    </div>`}
  `;
  document.getElementById('main-content').innerHTML = html;

  document.getElementById('new-contact-btn').onclick = () => openEditModal(null);
  document.querySelectorAll('[data-contact-id]').forEach(el => {

    b.onclick = () => { contactsFilter = b.dataset.filter; renderContactsList(); };

/* ============================================================
   RENDER — Birthdays calendar view
   ============================================================ */
function renderBirthdays() {
  const today = getTodayBdays();
  const upcoming = getUpcomingBdays(365);
  const grouped = {};
  upcoming.forEach(({ contact, days }) => {
    let bucket;
    if (days === 1) bucket = 'Завтра';
    else if (days <= 7) bucket = 'На этой неделе';
    else if (days <= 30) bucket = 'В этом месяце';
    else if (days <= 90) bucket = 'Ближайшие 3 месяца';
    else bucket = 'Позже';
    if (!grouped[bucket]) grouped[bucket] = [];
    grouped[bucket].push({ contact, days });
  });

  let html = `
    <div class="page-head">
      <div>
        <div class="page-greeting">никто не забыт</div>
        <div class="page-title">Дни рождения 🎂</div>
      </div>
    </div>
  `;

  if (today.length) {
    html += `<div class="section"><div class="section-head"><div class="section-title">🎉 Сегодня</div></div>`;
    today.forEach(c => {
      const age = ageOn(c.birthday);
      html += `
        <div class="bday-hero" data-bday-id="${esc(c.id)}" style="margin-bottom:12px">
          <div class="confetti" id="confetti-bd-${esc(c.id)}"></div>
          ${avatarHtml(c, 'reach').replace('reach-avatar', 'bday-hero-photo')}
          <div class="bday-hero-info">
            <div class="bday-hero-emoji">сегодня день рождения у</div>
            <div class="bday-hero-name">${esc(c.name)}</div>
            ${age != null ? `<div class="bday-hero-age">исполняется ${age + 1}</div>` : ''}
          </div>
          <div class="bday-hero-arrow">→</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  Object.entries(grouped).forEach(([bucket, arr]) => {
    html += `
      <div class="section">
        <div class="section-head">
          <div class="section-title">${bucket}</div>
          <span class="section-count">${arr.length}</span>
        </div>
        <div class="upcoming-grid">
          ${arr.map(({ contact, days }) => {
            const b = parseBday(contact.birthday);
            const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
            const dateStr = b ? `${b.day} ${months[b.month-1]}` : '';
            return `
              <button class="upcoming-card" data-contact-id="${esc(contact.id)}">
                ${avatarHtml(contact, 'small')}
                <div class="upcoming-name">${esc(contact.name)}</div>
                <div class="upcoming-when">${dateStr} · через ${days}д</div>
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });

  if (!today.length && !upcoming.length) {
    html += `<div class="empty">
      <div class="empty-icon">🎂</div>
      <div class="empty-title">Нет данных о днях рождения</div>
      <div class="empty-sub">Добавь даты рождения контактам — и ORBIT будет напоминать.</div>
    </div>`;
  }

  document.getElementById('main-content').innerHTML = html;
  document.querySelectorAll('[data-bday-id]').forEach(el => el.onclick = () => openBdayView(el.dataset.bdayId));
  document.querySelectorAll('[data-contact-id]').forEach(el => el.onclick = () => navigateTo('contact:' + el.dataset.contactId));
  today.forEach(c => {
    const cont = document.getElementById('confetti-bd-' + c.id);
    if (cont) startConfetti(cont);
  });
}

function formatBday(b) {
  const p = parseBday(b);
  if (!p) return '';
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${p.day} ${months[p.month-1]}${p.year ? ` ${p.year}г` : ''}`;
}

function logInteraction(contactId, type, topic) {
  const c = state.contacts.find(x => x.id === contactId);
  if (!c) return;
  const now = Date.now();
  if (!c.interactions) c.interactions = [];
  c.interactions.unshift({ date: now, type, topic });
  c.lastInteraction = now;
  c.updated = now;
  queueSave();
}

async function loadGreeting(c, force) {
  const el = document.getElementById('greeting-text');
  if (!el) return;
  const key = c.id + '-' + todayKey();
  if (greetingCache[key] && !force) {
    el.textContent = greetingCache[key];
    return;
  }
  if (!state.settings.geminiApiKey) {
    el.innerHTML = `<div style="color:var(--amber)">
      ⚠ Чтобы Gemini генерировал поздравления — добавь API key в Настройках.<br>
      <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--accent)">Получить ключ (бесплатно) →</a>
    </div>`;
    return;
  }
  el.innerHTML = '<div class="greeting-loading">Gemini пишет персональное поздравление...</div>';
  const res = await generateGreeting(c);
  if (res.error) {
    el.innerHTML = `<div style="color:var(--red)">⚠ Ошибка: ${esc(res.error)}</div>`;
  } else {
    greetingCache[key] = res.text;
    el.textContent = res.text;
  }
}

function saveBdayGreeting(c, text) {
  if (!c.bdayGreetings) c.bdayGreetings = [];
  const year = new Date().getFullYear();
  const existing = c.bdayGreetings.find(g => g.year === year);
  if (existing) existing.text = text;
  else c.bdayGreetings.unshift({ year, text, date: Date.now() });
  queueSave();
}

function getBdayHistory(c) {
  return (c.bdayGreetings || []).slice(0, 5);
}

async function loadSharedWishlistReservations(shareId) {
  try {
    const doc = await fb.db.collection(WISHLIST_COLLECTION).doc(shareId).get();
    if (!doc.exists) return;
    const data = doc.data();
    const reservations = data.reservations || {};
    // Group by item
    const byItem = {};
    Object.entries(reservations).forEach(([itemId, r]) => {
      if (!byItem[itemId]) byItem[itemId] = [];
      byItem[itemId].push(r);
    });
    state.wishlist.cachedReservations = byItem;
    if (currentView === 'wishlist') renderWishlist();
  } catch (e) { console.warn('Load wishlist reservations failed', e); }
}

async function shareWishlist() {
  ensureWishlist();
  // Generate shareId if not exists
  if (!state.wishlist.shareId) state.wishlist.shareId = uuid().replace(/-/g, '').slice(0, 12);
  state.wishlist.public = true;
  await syncWishlistToShared();
  const url = `${location.origin}${location.pathname}?wishlist=${state.wishlist.shareId}`;
  try {
    await navigator.clipboard.writeText(url);
    toast('Ссылка скопирована! Кидай друзьям', 'success');
  } catch (e) {
    prompt('Скопируй вручную:', url);
  }
  queueSave();
  render();
}

async function syncWishlistToShared() {
  if (!state.wishlist?.shareId || !currentUser) return;
  try {
    const docRef = fb.db.collection(WISHLIST_COLLECTION).doc(state.wishlist.shareId);
    const existing = await docRef.get();
    const reservations = existing.exists ? (existing.data().reservations || {}) : {};
    await docRef.set({
      ownerId: currentUser.uid,
      ownerName: currentUser.displayName || currentUser.email,
      ownerEmail: currentUser.email,
      ownerPhotoURL: currentUser.photoURL || null,
      items: state.wishlist.items.map(i => ({ ...i })),
      reservations,
      updatedAt: Date.now()
    }, { merge: false });
  } catch (e) {
    console.error('Sync wishlist failed', e);
    toast('Не удалось синхронизировать вишлист: ' + e.message, 'error');
  }
}

          <option value="3" ${e.priority===3?'selected':''}>3 — буду рад</option>
          <option value="4" ${e.priority===4?'selected':''}>4 — было бы прикольно</option>
          <option value="5" ${e.priority===5?'selected':''}>5 — мечта далёкая</option>
        </select>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);line-height:1.5;margin-top:6px">
      💡 Внутренние ссылки маркетплейсов — сразу с твоим выбором (цвет, размер). Так друзья не ошибутся.
    </div>
  `;
  document.getElementById('edit-save-btn').onclick = saveWishEdit;
  document.getElementById('modal-edit').classList.add('open');
}

function saveWishEdit() {
  ensureWishlist();
  const title = document.getElementById('w-title').value.trim();
  if (!title) { toast('Название обязательно', 'error'); return; }
  const item = {
    id: editingWishId || uuid(),
    title,
    url: document.getElementById('w-url').value.trim(),
    description: document.getElementById('w-desc').value.trim(),
    priceApprox: document.getElementById('w-price').value.trim(),
    priority: parseInt(document.getElementById('w-prio').value) || 3,
    updatedAt: Date.now()
  };
  if (!editingWishId) item.createdAt = Date.now();

  const idx = state.wishlist.items.findIndex(i => i.id === item.id);
  if (idx >= 0) state.wishlist.items[idx] = { ...state.wishlist.items[idx], ...item };
  else state.wishlist.items.push(item);

  // Restore edit-save-btn to default for contacts
  document.getElementById('edit-save-btn').onclick = saveContactFromForm;

  document.getElementById('modal-edit').classList.remove('open');
  queueSave();
  syncWishlistToShared();
  render();
  toast('Сохранено', 'success');
  editingWishId = null;
}

/* ============================================================
   WISHLIST VISITOR — when ?wishlist=ID is in URL
   ============================================================ */
async function renderWishlistVisitor(shareId) {
  // Use a totally different shell — no sidebar
  document.getElementById('shell').style.display = 'none';
  let mainEl = document.getElementById('visitor-shell');
  if (!mainEl) {
    mainEl = document.createElement('div');
    mainEl.id = 'visitor-shell';
    mainEl.className = 'visitor-shell';
    document.body.appendChild(mainEl);
  }
  mainEl.style.display = 'flex';

  mainEl.innerHTML = `<div class="visitor-inner"><div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">Загружаю вишлист...</div></div></div>`;

  try {
    const doc = await fb.db.collection(WISHLIST_COLLECTION).doc(shareId).get();
    if (!doc.exists) {
      mainEl.innerHTML = `<div class="visitor-inner"><div class="empty"><div class="empty-icon">😕</div><div class="empty-title">Вишлист не найден</div><div class="empty-sub">Возможно ссылка устарела или была удалена.</div></div></div>`;
      return;
    }
    const data = doc.data();
    visitorData = { shareId, doc: data };

    // Subscribe for real-time updates
    if (visitorUnsub) visitorUnsub();
    visitorUnsub = fb.db.collection(WISHLIST_COLLECTION).doc(shareId).onSnapshot(d => {
      if (d.exists) {
        visitorData.doc = d.data();
        renderVisitorContent();
      }
    });

    renderVisitorContent();
  } catch (e) {
    mainEl.innerHTML = `<div class="visitor-inner"><div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">Ошибка</div><div class="empty-sub">${esc(e.message)}</div></div></div>`;
  }
}

function renderVisitorContent() {
  const mainEl = document.getElementById('visitor-shell');
  if (!mainEl || !visitorData) return;
  const data = visitorData.doc;
  const myUid = currentUser?.uid;
  const ownerInitials = (data.ownerName || '?').split(/\s+/).map(p => p[0] || '').join('').slice(0,2).toUpperCase();
  const items = (data.items || []).slice().sort((a, b) => (a.priority || 3) - (b.priority || 3));
  const reservations = data.reservations || {};

  // Group reservations by itemId
  const resByItem = {};
  Object.entries(reservations).forEach(([key, r]) => {
    // key format: 'itemId__userId' OR 'itemId' (legacy)
    const [itemId] = key.split('__');
    if (!resByItem[itemId]) resByItem[itemId] = [];
    resByItem[itemId].push({ key, ...r });
  });

  const isOwner = data.ownerId === myUid;

  let html = `
    <div class="visitor-inner">
      <a href="${location.origin}${location.pathname}" class="visitor-back">← К моему ORBIT</a>
      <div class="visitor-head">
        <div class="visitor-owner">
          <div class="visitor-owner-avatar" ${data.ownerPhotoURL ? `style="background-image:url('${esc(data.ownerPhotoURL)}')"` : ''}>${data.ownerPhotoURL ? '' : esc(ownerInitials)}</div>
          <div class="visitor-owner-name">${esc(data.ownerName)}</div>
        </div>
        <div class="visitor-title">💝 Вишлист</div>
        <div class="visitor-sub">
          ${isOwner
            ? 'Это твой вишлист — ты не видишь имена тех кто забронировал, только их количество. Сюрприз!'
            : 'Выбери что хочешь подарить и забронируй — другие гости увидят твою бронь, чтобы не было дублей. Именинник не узнает кто что взял.'}
        </div>
      </div>

      ${items.length ? `<div class="wish-list">
        ${items.map(item => {
          const itemReservations = resByItem[item.id] || [];
          const myRes = itemReservations.find(r => r.byUid === myUid);
          const othersRes = itemReservations.filter(r => r.byUid !== myUid);

          return `
            <div class="wish-item">
              <div class="wish-item-prio p${item.priority || 3}">${item.priority || 3}</div>
              <div class="wish-item-main">
                <div class="wish-item-title">
                  ${item.url
                    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a>`
                    : esc(item.title)}
                </div>
                ${item.description ? `<div class="wish-item-desc">${esc(item.description)}</div>` : ''}
                <div class="wish-item-meta">
                  ${item.priceApprox ? `<span class="pill price">${esc(item.priceApprox)}</span>` : ''}
                  <span class="pill">приоритет ${item.priority || 3}/5</span>
                </div>

                ${isOwner
                  ? (itemReservations.length > 0
                    ? `<div class="wish-reserved-badge">✅ Забронировано · ${itemReservations.length}</div>`
                    : '')
                  : `${itemReservations.length > 0 ? `<div class="wish-reservation-list">
                      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-weight:700">Кто берёт:</div>
                      ${itemReservations.map(r => `<div class="wish-reservation-row">
                        <div class="wish-rev-avatar" ${r.byPhotoURL ? `style="background-image:url('${esc(r.byPhotoURL)}')"` : ''}>${r.byPhotoURL ? '' : esc((r.byName || '?').slice(0,1).toUpperCase())}</div>
                        <div class="wish-rev-name ${r.byUid === myUid ? 'wish-rev-mine' : ''}">${esc(r.byName)}${r.byUid === myUid ? ' (ты)' : ''}</div>
                      </div>`).join('')}
                    </div>` : ''}
                    ${myRes
                      ? `<button class="wish-reserve-btn cancel" data-cancel-res="${esc(item.id)}">✕ Отменить мою бронь</button>`
                      : `<button class="wish-reserve-btn" data-reserve="${esc(item.id)}">🎁 Я возьму это</button>`}
                  `}
              </div>
            </div>
          `;
        }).join('')}
      </div>` : `<div class="empty"><div class="empty-icon">💝</div><div class="empty-title">Пока пусто</div><div class="empty-sub">Хозяин ещё не добавил пункты в вишлист.</div></div>`}
    </div>
  `;
  mainEl.innerHTML = html;

  mainEl.querySelectorAll('[data-reserve]').forEach(b => {
    b.onclick = () => reserveWishItem(b.dataset.reserve);
  });
  mainEl.querySelectorAll('[data-cancel-res]').forEach(b => {
    b.onclick = () => cancelReservation(b.dataset.cancelRes);
  });
}

async function reserveWishItem(itemId) {
  if (!visitorData || !currentUser) return;
  const key = itemId + '__' + currentUser.uid;
  try {
    await fb.db.collection(WISHLIST_COLLECTION).doc(visitorData.shareId).update({
      ['reservations.' + key]: {
        itemId,
        byUid: currentUser.uid,
        byName: currentUser.displayName || currentUser.email,
        byEmail: currentUser.email,
        byPhotoURL: currentUser.photoURL || null,
        at: Date.now()
      },
      updatedAt: Date.now()
    });
    toast('🎁 Забронировано', 'success');
  } catch (e) {
    toast('Не удалось забронировать: ' + e.message, 'error');
  }
}

async function cancelReservation(itemId) {
  if (!visitorData || !currentUser) return;
  const key = itemId + '__' + currentUser.uid;
  try {
    await fb.db.collection(WISHLIST_COLLECTION).doc(visitorData.shareId).update({
      ['reservations.' + key]: firebase.firestore.FieldValue.delete(),
      updatedAt: Date.now()
    });
    toast('Бронь снята', 'success');
  } catch (e) {
    toast('Не удалось отменить: ' + e.message, 'error');
  }
}

/* ============================================================
   AI CHAT — 5 questions then generates contextual greeting
   ============================================================ */
const AI_QUESTIONS = [
  'Расскажи о ваших общих воспоминаниях, шутках или особых историях, которые вас связывают.',
  'Какие сейчас у вас отношения? Близкие друзья, давно не общались, родственники, по работе?',
  'Что у этого человека сейчас в жизни? Новый этап, переезд, успех, тяжёлый период?',
  'Какой тон поздравления нужен? Тёплый и душевный / шутливый / благодарный / формальный?',
  'Что-то особенное в этом году? Юбилей, новое начало, важное событие, или просто очередной день рождения?'
];

let aiChat = null;
// { contactId, step, answers: [], generated: null|{text}|{error}, busy: false }

function openAIChat(contactId) {
  const c = state.contacts.find(x => x.id === contactId);
  if (!c) { toast('Контакт не найден', 'error'); return; }
  aiChat = { contactId, step: 0, answers: [], generated: null, busy: false };
  document.getElementById('ai-chat').classList.add('show');
  document.getElementById('ai-chat-fab').classList.remove('show');
  document.getElementById('ai-chat-title').textContent = `Поздравить ${c.name.split(/\s+/)[0]}`;
  document.getElementById('ai-chat-sub').textContent = '5 вопросов — и идеальный текст';
  const av = document.getElementById('ai-chat-avatar');
  if (c.photoURL) { av.style.backgroundImage = `url('${esc(c.photoURL)}')`; av.textContent = ''; }
  else { av.style.backgroundImage = ''; av.textContent = '🎂'; }
  renderAIChat();
  setTimeout(() => document.getElementById('ai-chat-textarea')?.focus(), 200);
}

function closeAIChat() {
  document.getElementById('ai-chat').classList.remove('show');
  if (aiChat && aiChat.contactId) {
    const c = state.contacts.find(x => x.id === aiChat.contactId);
    if (c && (isBdayToday(c.birthday) || daysUntilBday(c.birthday) <= 14)) {
      document.getElementById('ai-chat-fab').classList.add('show');
    }
  }
}

function renderAIChat() {
  const body = document.getElementById('ai-chat-body');
  if (!aiChat) return;
  const c = state.contacts.find(x => x.id === aiChat.contactId);
  if (!c) return;

  let html = `<div class="ai-msg assistant">
    <div class="ai-msg-step">Привет!</div>
    Помогу написать персональное поздравление для <strong>${esc(c.name)}</strong>. Чем точнее ответишь — тем лучше получится. Поехали.
  </div>`;

  for (let i = 0; i < aiChat.step; i++) {
    html += `<div class="ai-msg assistant">
      <div class="ai-msg-step">Вопрос ${i+1} / 5</div>
      ${esc(AI_QUESTIONS[i])}
    </div>`;
    html += `<div class="ai-msg user">${esc(aiChat.answers[i])}</div>`;
  }

  if (aiChat.step < 5) {
    html += `<div class="ai-msg assistant">
      <div class="ai-msg-step">Вопрос ${aiChat.step+1} / 5</div>
      ${esc(AI_QUESTIONS[aiChat.step])}
    </div>`;
    document.getElementById('ai-chat-input-wrap').style.display = 'flex';
  } else {
    document.getElementById('ai-chat-input-wrap').style.display = 'none';
    if (aiChat.busy) {
      html += `<div class="ai-msg assistant">
        <span class="ai-loading-dot"></span><span class="ai-loading-dot"></span><span class="ai-loading-dot"></span>
        <span style="margin-left:8px;font-size:13px">пишу поздравление...</span>
      </div>`;
    } else if (aiChat.generated?.error) {
      html += `<div class="ai-msg assistant" style="background:var(--red-bg);border-color:var(--red);color:var(--red)">
        ⚠ ${esc(aiChat.generated.error)}
      </div>
      <div class="ai-result-actions">
        <button class="ai-result-btn" data-action="retry">↻ Попробовать заново</button>
      </div>`;
    } else if (aiChat.generated?.text) {
      html += `<div class="ai-msg result">${esc(aiChat.generated.text)}</div>
      <div class="ai-result-actions">
        <button class="ai-result-btn primary" data-action="copy">📋 Скопировать</button>
        <button class="ai-result-btn" data-action="regen">↻ Заново</button>
        <button class="ai-result-btn" data-action="restart">⟲ Сначала</button>
      </div>`;
    }
  }

  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;

  body.querySelectorAll('[data-action]').forEach(b => {
    b.onclick = () => handleAIChatAction(b.dataset.action);
  });

  // Auto-start generation when reaching step 5
  if (aiChat.step === 5 && !aiChat.busy && !aiChat.generated) {
    runAIGeneration();
  }
}

function handleAIChatAction(action) {
  if (action === 'copy') {
    if (aiChat.generated?.text) {
      navigator.clipboard.writeText(aiChat.generated.text);
      toast('Скопировано', 'success');
    }
  } else if (action === 'regen') {
    aiChat.generated = null;
    runAIGeneration();
  } else if (action === 'restart' || action === 'retry') {
    aiChat.step = 0;
    aiChat.answers = [];
    aiChat.generated = null;
    aiChat.busy = false;
    renderAIChat();
    setTimeout(() => document.getElementById('ai-chat-textarea')?.focus(), 100);
  }
}

async function runAIGeneration() {
  aiChat.busy = true;
  aiChat.generated = null;
  renderAIChat();
  const c = state.contacts.find(x => x.id === aiChat.contactId);
  const result = await generateContextualGreeting(c, aiChat.answers);
  aiChat.busy = false;
  aiChat.generated = result;
  // Save greeting to history on success
  if (result.text) saveBdayGreeting(c, result.text);
  renderAIChat();
}

function submitAIAnswer() {
  if (!aiChat || aiChat.step >= 5) return;
  const ta = document.getElementById('ai-chat-textarea');
  const v = (ta.value || '').trim();
  if (!v) return;
  aiChat.answers.push(v);
  aiChat.step++;
  ta.value = '';
  ta.style.height = 'auto';
  renderAIChat();
}

async function generateContextualGreeting(contact, answers) {
  const key = (state.settings.geminiApiKey || '').trim();
  if (!key) return { error: 'Не задан AI-ключ. Зайди в Настройки.' };
  const provider = detectAIProvider(key);
  if (!provider) return { error: 'Неизвестный формат ключа' };

  const age = ageOn(contact.birthday);
  const ageNew = age != null ? age + 1 : null;
  const interests = (contact.interests || []).join(', ');

  let prompt = 'Ты — друг, который пишет персональное поздравление с днём рождения по-русски.\n\n';
  prompt += 'КОМУ ПИШЕМ:\n';
  prompt += `- Имя: ${contact.name}\n`;
  if (ageNew) prompt += `- Исполняется: ${ageNew} лет\n`;
  if (contact.occupation) prompt += `- Чем занимается: ${contact.occupation}\n`;
  if (interests) prompt += `- Интересы: ${interests}\n`;
  if (contact.notes) prompt += `- Доп. заметки: ${contact.notes}\n`;

  prompt += '\nКОНТЕКСТ ОТНОШЕНИЙ (это сказал автор поздравления):\n\n';
  AI_QUESTIONS.forEach((q, i) => {
    if (answers[i]) {
      prompt += `❓ ${q}\n💬 "${answers[i]}"\n\n`;
    }
  });

  prompt += '\nТРЕБОВАНИЯ К ТЕКСТУ:\n';
  prompt += '- 3-5 предложений, душевно и НЕ длинно\n';
  prompt += '- ОБЯЗАТЕЛЬНО используй конкретные детали из ответов выше — это сердце поздравления\n';
  prompt += '- Тон строго в соответствии с 4-м ответом (если шутка — пиши с лёгкостью, если тепло — тепло)\n';
  prompt += '- НИКАКИХ штампов "счастья здоровья успехов в делах" и подобных пустых фраз\n';
  prompt += '- От первого лица, как будто я лично говорю\n';
  prompt += '- Без эмодзи и без преамбулы (не пиши "вот поздравление:" — сразу текст)\n';
  prompt += '- На русском языке\n\n';
  prompt += 'ТЕКСТ ПОЗДРАВЛЕНИЯ:';

  try {
    let text;
    if (provider === 'groq') text = await callGroq(key, prompt);
    else if (provider === 'openrouter') text = await callOpenRouter(key, prompt);
    else if (provider === 'deepseek') text = await callDeepSeek(key, prompt);
    else if (provider === 'mistral') text = await callMistral(key, prompt);
    else text = await callGemini(key, prompt);
    if (!text) return { error: 'Пустой ответ' };
    return { text: text.trim() };
  } catch (e) {
    return { error: e.message };
  }
}

document.getElementById('auth-signin-btn').onclick = authSignIn;

};
document.getElementById('sidebar-backdrop').onclick = closeMobileSidebar;

// AI Chat wiring
document.getElementById('ai-chat-close').onclick = closeAIChat;

};
document.getElementById('ai-chat-send').onclick = submitAIAnswer;
document.getElementById('ai-chat-textarea').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitAIAnswer(); }
});
document.getElementById('ai-chat-textarea').addEventListener('input', e => {
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(120, e.target.scrollHeight) + 'px';
});

document.addEventListener('click', e => {
  if (e.target.matches('[data-close]') || e.target.matches('.modal-bg')) {
    const m = e.target.closest('.modal-bg');
    if (m) m.classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-bg.open').forEach(m => m.classList.remove('open'));
    if (document.getElementById('bday-view').classList.contains('show')) closeBdayView();
  }
});

// On tab focus — re-check today (in case day changed)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && currentUser) {
    notifyTodayBdays();
    if (currentView === 'today') render();
  }
});
